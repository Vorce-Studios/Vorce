name: "Stable Release"

on:
  push:
    tags:
      - "v*.*.*"
      - "*.*.*"
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (e.g. v1.0.0)'
        required: true
      is_prerelease:
        description: 'Mark as Pre-release'
        required: false
        type: boolean
        default: true

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  resolve-release:
    name: "Resolve Release Metadata"
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.release.outputs.version }}
      is_prerelease: ${{ steps.release.outputs.is_prerelease }}
    steps:
      - name: Resolve version and prerelease flag
        id: release
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          MANUAL_VERSION: ${{ github.event.inputs.version }}
          MANUAL_IS_PRERELEASE: ${{ github.event.inputs.is_prerelease }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          if [[ "$EVENT_NAME" == "workflow_dispatch" ]]; then
            VERSION="$MANUAL_VERSION"
            IS_PRERELEASE="$MANUAL_IS_PRERELEASE"
          else
            VERSION="$REF_NAME"
            if [[ "$VERSION" == *-* ]]; then
              IS_PRERELEASE=true
            else
              IS_PRERELEASE=false
            fi
          fi

          if [[ -z "$VERSION" ]]; then
            echo "Release version must not be empty." >&2
            exit 1
          fi

          if [[ ! "$VERSION" =~ ^v?[0-9]+\.[0-9]+\.[0-9]+([-.][0-9A-Za-z.-]+)?$ ]]; then
            echo "Unsupported release version/tag: $VERSION" >&2
            exit 1
          fi

          {
            echo "version=$VERSION"
            echo "is_prerelease=$IS_PRERELEASE"
          } >> "$GITHUB_OUTPUT"

  build-windows:
    name: "Build (Windows x64)"
    needs: [resolve-release]
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install LLVM and Clang
        uses: KyleMayes/install-llvm-action@v2
        with:
          version: "18"
          directory: ${{ runner.temp }}/llvm

      - name: Set LIBCLANG_PATH
        shell: pwsh
        run: |
          $llvmBin = "${{ runner.temp }}\llvm\bin"
          Add-Content -Path $env:GITHUB_ENV -Value "LIBCLANG_PATH=$llvmBin"
          Add-Content -Path $env:GITHUB_ENV -Value "CLANG_PATH=$llvmBin\clang.exe"
          Add-Content -Path $env:GITHUB_PATH -Value "$llvmBin"

      - name: Cache Cargo Registry
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Set up MSVC Developer Command Prompt
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Cache vcpkg
        id: cache-vcpkg
        uses: actions/cache@v5
        with:
          path: vcpkg
          key: ${{ runner.os }}-vcpkg-full-clone-v1-${{ hashFiles('vcpkg.json') }}
          restore-keys: |
            ${{ runner.os }}-vcpkg-full-clone-v1-

      - name: vcpkg installieren
        shell: pwsh
        run: |
          if (-not (Test-Path "vcpkg")) {
            git clone https://github.com/microsoft/vcpkg.git
          } elseif (Test-Path "vcpkg\\.git\\shallow") {
            git -C vcpkg fetch --unshallow origin
          } else {
            git -C vcpkg fetch origin
          }

          .\vcpkg\bootstrap-vcpkg.bat

      - name: Cache vcpkg installed libs
        id: cache-vcpkg-installed
        uses: actions/cache@v5
        with:
          path: vcpkg_installed
          key: ${{ runner.os }}-vcpkg-installed-${{ hashFiles('vcpkg.json') }}
          restore-keys: |
            ${{ runner.os }}-vcpkg-installed-

      - name: VCPKG_ROOT-Variable setzen
        shell: pwsh
        run: |
          $vcpkgRoot = "$(Get-Location)\vcpkg"
          $installedDir = "$(Get-Location)\vcpkg_installed"
          Add-Content -Path $env:GITHUB_ENV -Value "VCPKG_ROOT=$vcpkgRoot"
          Add-Content -Path $env:GITHUB_ENV -Value "VCPKG_DEFAULT_TRIPLET=x64-windows"
          Add-Content -Path $env:GITHUB_ENV -Value "VCPKG_INSTALLED_DIR=$installedDir"

      - name: Install dependencies via vcpkg manifest
        shell: pwsh
        run: .\vcpkg\vcpkg install --triplet $env:VCPKG_DEFAULT_TRIPLET --x-manifest-root .

      - name: Set FFmpeg environment for ffmpeg-sys-next
        shell: pwsh
        run: |
          $RawInstalledDir = "$(Get-Location)/vcpkg_installed/x64-windows"
          $InstalledDir = $RawInstalledDir.Replace('\', '/')
          $IncludePath = "$InstalledDir/include"
          $LibPath = "$InstalledDir/lib"
          $BinPath = "$InstalledDir/bin"
          $PkgConfigPath = "$InstalledDir/lib/pkgconfig"

          Add-Content -Path $env:GITHUB_ENV -Value "FFMPEG_DIR=$InstalledDir"
          Add-Content -Path $env:GITHUB_ENV -Value "FFMPEG_INCLUDE_DIR=$IncludePath"
          Add-Content -Path $env:GITHUB_ENV -Value "FFMPEG_LIB_DIR=$LibPath"
          Add-Content -Path $env:GITHUB_ENV -Value "FFMPEG_VERSION=7.1"
          Add-Content -Path $env:GITHUB_ENV -Value "PKG_CONFIG_PATH=$PkgConfigPath"

          # Force bindgen/clang to use vcpkg headers on Windows MSVC and avoid Linux path leakage
          $ClangArgs = "--target=x86_64-pc-windows-msvc -I`"$IncludePath`""
          Add-Content -Path $env:GITHUB_ENV -Value "BINDGEN_EXTRA_CLANG_ARGS=$ClangArgs"
          Add-Content -Path $env:GITHUB_PATH -Value "$BinPath"

      - name: Verify FFmpeg Headers
        shell: pwsh
        run: |
          if (Test-Path "$env:FFMPEG_INCLUDE_DIR/libavcodec/avfft.h") {
            Write-Host "✅ avfft.h found at $env:FFMPEG_INCLUDE_DIR/libavcodec/avfft.h"
          } else {
            Write-Error "❌ avfft.h NOT found! Check vcpkg installation."
            exit 1
          }

      - name: Install cargo-wix
        run: |
          # Use binstall if available or cargo install
          cargo install cargo-wix --locked || true

      - name: Build (Release)
        shell: pwsh
        run: |
          cargo build --release -p stagegraph --features "audio,ffmpeg" --verbose

      - name: Prepare Release Folder & Copy DLLs
        shell: pwsh
        run: |
          $ReleaseDir = "target/release"
          $VcpkgBin = "vcpkg_installed/x64-windows/bin"
          Copy-Item "$VcpkgBin/*.dll" "$ReleaseDir/" -Force

      - name: Create ZIP Artifact
        shell: pwsh
        run: |
          $Version = "${{ needs.resolve-release.outputs.version }}"
          $ZipName = "MapFlow-$Version-Windows-x64.zip"
          Compress-Archive -Path "target/release/MapFlow.exe", "target/release/*.dll" -DestinationPath "$ZipName"
          Add-Content -Path $env:GITHUB_ENV -Value "ZIP_PATH=$ZipName"

      - name: Ensure WiX Output Directory
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path "target/wix" -Force | Out-Null

      - name: Build MSI Installer
        shell: pwsh
        run: |
          cargo wix -p stagegraph --no-build --release
          $MsiPath = Get-ChildItem -Path "target/wix/*.msi" -File -ErrorAction SilentlyContinue | Select-Object -First 1 -ExpandProperty FullName
          if (-not $MsiPath) {
            Write-Error "No MSI artifact was generated in target/wix."
            exit 1
          }
          Move-Item -Path $MsiPath -Destination "MapFlow-${{ needs.resolve-release.outputs.version }}-x64.msi"

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-artifacts
          if-no-files-found: error
          path: |
            MapFlow-${{ needs.resolve-release.outputs.version }}-Windows-x64.zip
            MapFlow-${{ needs.resolve-release.outputs.version }}-x64.msi

  build-linux:
    name: "Build (Linux x64)"
    needs: [resolve-release]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo Registry
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install System Dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            build-essential pkg-config clang libclang-dev yasm nasm \
            libfontconfig1-dev libfreetype6-dev \
            libasound2-dev libavcodec-dev libavformat-dev libavutil-dev \
            libswscale-dev libavdevice-dev libavfilter-dev libswresample-dev \
            libpostproc-dev libavcodec-extra \
            libudev-dev libxcb1-dev libxcb-render0-dev libxcb-shape0-dev \
            libxcb-xfixes0-dev libx11-dev libxcursor-dev libxi-dev libxrandr-dev \
            libxinerama-dev libwayland-dev libxkbcommon-dev libssl-dev \
            ffmpeg
      - name: Build (Release)
        run: cargo build --release -p stagegraph --features "audio,ffmpeg"
      - name: Create Tarball
        run: |
          VERSION="${{ needs.resolve-release.outputs.version }}"
          TAR_NAME="MapFlow-$VERSION-Linux-x64.tar.gz"
          cd target/release
          tar -czf "../../$TAR_NAME" MapFlow
      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-artifacts
          if-no-files-found: error
          path: MapFlow-${{ needs.resolve-release.outputs.version }}-Linux-x64.tar.gz

  build-macos:
    name: "Build (macOS Beta)"
    needs: [resolve-release]
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo Registry
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Build (Release)
        run: cargo build --release -p stagegraph --no-default-features --features "macos-beta"

      - name: Package .app Bundle
        shell: bash
        run: |
          bash scripts/mapflow/package-macos-app.sh "${{ needs.resolve-release.outputs.version }}"

      - name: Create ZIP Artifact
        shell: bash
        run: |
          VERSION="${{ needs.resolve-release.outputs.version }}"
          ZIP_NAME="MapFlow-$VERSION-macOS-beta.zip"
          ditto -c -k --sequesterRsrc --keepParent "target/release/MapFlow.app" "$ZIP_NAME"

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-artifacts
          if-no-files-found: error
          path: MapFlow-${{ needs.resolve-release.outputs.version }}-macOS-beta.zip

  publish-release:
    name: "Publish Release"
    needs: [resolve-release, build-windows, build-linux, build-macos]
    runs-on: ubuntu-latest
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          merge-multiple: true
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_VERSION: ${{ needs.resolve-release.outputs.version }}
          RELEASE_IS_PRERELEASE: ${{ needs.resolve-release.outputs.is_prerelease }}
        shell: bash
        run: |
          set -euo pipefail

          assets=(
            "release-artifacts/MapFlow-$RELEASE_VERSION-Windows-x64.zip"
            "release-artifacts/MapFlow-$RELEASE_VERSION-x64.msi"
            "release-artifacts/MapFlow-$RELEASE_VERSION-Linux-x64.tar.gz"
            "release-artifacts/MapFlow-$RELEASE_VERSION-macOS-beta.zip"
          )

          args=(
            "$RELEASE_VERSION"
            --target "$GITHUB_SHA"
            --title "MapFlow $RELEASE_VERSION"
            --generate-notes
          )

          if [[ "$RELEASE_IS_PRERELEASE" == "true" ]]; then
            args+=(--prerelease)
          fi

          args+=("${assets[@]}")

          gh release create "${args[@]}"
