name: "Stable Release"

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (e.g. v1.0.0)'
        required: true
      is_prerelease:
        description: 'Mark as Pre-release'
        required: false
        type: boolean
        default: true

permissions:
  contents: write

jobs:
  build-windows:
    name: "Build (Windows x64)"
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install LLVM and Clang
        uses: KyleMayes/install-llvm-action@v2
        with:
          version: "18"
          directory: ${{ runner.temp }}/llvm

      - name: Set LIBCLANG_PATH
        shell: pwsh
        run: |
          $llvmBin = "${{ runner.temp }}\llvm\bin"
          Add-Content -Path $env:GITHUB_ENV -Value "LIBCLANG_PATH=$llvmBin"
          Add-Content -Path $env:GITHUB_ENV -Value "CLANG_PATH=$llvmBin\clang.exe"
          Add-Content -Path $env:GITHUB_PATH -Value "$llvmBin"

      - name: Cache Cargo Registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Set up MSVC Developer Command Prompt
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Cache vcpkg
        id: cache-vcpkg
        uses: actions/cache@v4
        with:
          path: |
            ${{ github.workspace }}/vcpkg_installed
            ${{ env.VCPKG_ROOT }}
          key: ${{ runner.os }}-vcpkg-${{ hashFiles('vcpkg.json') }}
          restore-keys: |
            ${{ runner.os }}-vcpkg-

      - name: Set up vcpkg
        shell: pwsh
        run: |
          if ($null -eq $env:VCPKG_ROOT) {
            $vcpkgPath = "${{ runner.workspace }}\vcpkg"
            if (-not (Test-Path $vcpkgPath)) {
              git clone --depth 1 https://github.com/microsoft/vcpkg.git $vcpkgPath
              & "$vcpkgPath\bootstrap-vcpkg.bat"
            }
            Add-Content -Path $env:GITHUB_ENV -Value "VCPKG_ROOT=$vcpkgPath"
          }

      - name: ffmpeg mit vcpkg installieren (Manifest Mode)
        shell: pwsh
        run: |
          $vcpkgExe = "$env:VCPKG_ROOT\vcpkg.exe"
          & $vcpkgExe install --triplet x64-windows --x-install-root="${{ github.workspace }}\vcpkg_installed"

      - name: Set FFmpeg environment for ffmpeg-sys-next
        shell: pwsh
        run: |
          $InstalledDir = "${{ github.workspace }}\vcpkg_installed\x64-windows"
          $UnixInstalledDir = $InstalledDir.Replace('\', '/')
          $IncludePath = "$InstalledDir\include"
          $LibPath = "$InstalledDir\lib"
          $BinPath = "$InstalledDir\bin"
          $PkgConfigPath = "$UnixInstalledDir/lib/pkgconfig"

          Add-Content -Path $env:GITHUB_ENV -Value "FFMPEG_DIR=$UnixInstalledDir"
          Add-Content -Path $env:GITHUB_ENV -Value "FFMPEG_INCLUDE_DIR=$UnixInstalledDir/include"
          Add-Content -Path $env:GITHUB_ENV -Value "FFMPEG_LIB_DIR=$UnixInstalledDir/lib"
          Add-Content -Path $env:GITHUB_ENV -Value "FFMPEG_VERSION=7.1"
          Add-Content -Path $env:GITHUB_ENV -Value "PKG_CONFIG_PATH=$PkgConfigPath"

          # Add to PATH for both CMD and PowerShell
          Add-Content -Path $env:GITHUB_PATH -Value "$BinPath"

          # Bindgen arguments to ensure correct headers and target
          $ClangArgs = "-I`"$IncludePath`" --target=x86_64-pc-windows-msvc"
          Add-Content -Path $env:GITHUB_ENV -Value "BINDGEN_EXTRA_CLANG_ARGS=$ClangArgs"

          # MSVC Include path fallback
          Add-Content -Path $env:GITHUB_ENV -Value "INCLUDE=$IncludePath"

      - name: Verify FFmpeg Headers
        shell: pwsh
        run: |
          $HeaderFile = "${{ github.workspace }}\vcpkg_installed\x64-windows\include\libavcodec\avfft.h"
          if (Test-Path $HeaderFile) {
            Write-Host "✅ avfft.h found at $HeaderFile"
          } else {
            Write-Error "❌ avfft.h NOT found! Check vcpkg installation at: $HeaderFile"
            exit 1
          }

      - name: Install cargo-wix
        run: cargo install cargo-wix --locked || true

      - name: Build (Release)
        shell: pwsh
        run: |
          $env:LIBCLANG_PATH = "${{ runner.temp }}\llvm\bin"
          cargo build --release -p mapmap --features "audio,ffmpeg" --verbose

      - name: Prepare Release Folder & Copy DLLs
        shell: pwsh
        run: |
          $ReleaseDir = "target/release"
          $VcpkgBin = "vcpkg_installed/x64-windows/bin"
          if (-not (Test-Path $ReleaseDir)) { New-Item -ItemType Directory -Path $ReleaseDir -Force }
          Copy-Item "$VcpkgBin/*.dll" "$ReleaseDir/" -Force

      - name: Create ZIP Artifact
        shell: pwsh
        run: |
          $Version = "${{ inputs.version }}"
          $ZipName = "MapFlow-$Version-Windows-x64.zip"
          Compress-Archive -Path "target/release/MapFlow.exe", "target/release/*.dll" -DestinationPath "$ZipName"
          Add-Content -Path $env:GITHUB_ENV -Value "ZIP_PATH=$ZipName"

      - name: Build MSI Installer
        shell: pwsh
        run: |
          $env:LIBCLANG_PATH = "${{ runner.temp }}\llvm\bin"
          cargo wix --release -p mapmap --no-check-includes
          $MsiPath = Get-ChildItem -Path "target/wix/*.msi" | Select-Object -First 1 -ExpandProperty FullName
          Move-Item -Path $MsiPath -Destination "MapFlow-${{ inputs.version }}-x64.msi"

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-artifacts
          path: |
            MapFlow-${{ inputs.version }}-Windows-x64.zip
            MapFlow-${{ inputs.version }}-x64.msi

  build-linux:
    name: "Build (Linux x64)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo Registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install System Dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            build-essential pkg-config clang libclang-dev \
            libasound2-dev libavcodec-dev libavformat-dev libavutil-dev \
            libswscale-dev libavdevice-dev libavfilter-dev libswresample-dev \
            libpostproc-dev libavcodec-extra \
            libudev-dev libx11-dev libxcursor-dev libxi-dev libxrandr-dev \
            libxinerama-dev libwayland-dev libxkbcommon-dev libssl-dev \
            ffmpeg
      - name: Build (Release)
        run: |
          export LIBCLANG_PATH=/usr/lib/llvm-14/lib
          cargo build --release -p mapmap --features "audio,ffmpeg"
      - name: Create Tarball
        run: |
          VERSION="${{ inputs.version }}"
          TAR_NAME="MapFlow-$VERSION-Linux-x64.tar.gz"
          cd target/release
          tar -czf "../../$TAR_NAME" MapFlow
      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-artifacts
          path: MapFlow-${{ inputs.version }}-Linux-x64.tar.gz

  publish-release:
    name: "Publish Release"
    needs: [build-windows, build-linux]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true
      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ inputs.version }}" \
            --title "MapFlow ${{ inputs.version }}" \
            --generate-notes \
            ${{ inputs.is_prerelease && '--prerelease' || '' }} \
            MapFlow-${{ inputs.version }}-Windows-x64.zip \
            MapFlow-${{ inputs.version }}-x64.msi \
            MapFlow-${{ inputs.version }}-Linux-x64.tar.gz
