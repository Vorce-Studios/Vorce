name: "Stable Release"

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (e.g. v1.0.0)'
        required: true
      is_prerelease:
        description: 'Mark as Pre-release'
        required: false
        type: boolean
        default: true

permissions:
  contents: write

jobs:
  build-windows:
    name: "Build (Windows x64)"
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo Registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Set up MSVC Developer Command Prompt
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Cache vcpkg
        id: cache-vcpkg
        uses: actions/cache@v4
        with:
          path: vcpkg
          key: ${{ runner.os }}-vcpkg-${{ hashFiles('vcpkg.json') }}
          restore-keys: |
            ${{ runner.os }}-vcpkg-

      - name: vcpkg installieren
        shell: pwsh
        run: |
          if (-not (Test-Path "vcpkg")) {
            git clone --depth 1 https://github.com/microsoft/vcpkg.git
            .\vcpkg\bootstrap-vcpkg.bat
          }
          .\vcpkg\vcpkg integrate install

      - name: Cache vcpkg installed libs
        id: cache-vcpkg-installed
        uses: actions/cache@v4
        with:
          path: vcpkg/installed
          key: ${{ runner.os }}-vcpkg-installed-${{ hashFiles('vcpkg.json') }}
          restore-keys: |
            ${{ runner.os }}-vcpkg-installed-

      - name: VCPKG_ROOT-Variable setzen
        shell: pwsh
        run: |
          $vcpkgRoot = "$(Get-Location)\vcpkg"
          Add-Content -Path $env:GITHUB_ENV -Value "VCPKG_ROOT=$vcpkgRoot"
          Add-Content -Path $env:GITHUB_ENV -Value "VCPKG_DEFAULT_TRIPLET=x64-windows"

      - name: ffmpeg mit vcpkg installieren
        if: steps.cache-vcpkg-installed.outputs.cache-hit != 'true'
        shell: pwsh
        run: .\vcpkg\vcpkg install ffmpeg:x64-windows

      - name: Set LIBCLANG_PATH
        shell: pwsh
        run: |
          if (Test-Path "C:\Program Files\LLVM\bin") {
            Add-Content -Path $env:GITHUB_ENV -Value "LIBCLANG_PATH=C:\Program Files\LLVM\bin"
            Add-Content -Path $env:GITHUB_PATH -Value "C:\Program Files\LLVM\bin"
          } else {
            Add-Content -Path $env:GITHUB_ENV -Value "LIBCLANG_PATH=C:\Program Files\LLVM\lib"
          }

      - name: Set FFmpeg environment for ffmpeg-sys-next
        shell: pwsh
        run: |
          $VcpkgRoot = "$(Get-Location)\vcpkg"
          $InstalledDir = "$VcpkgRoot\installed\x64-windows"
          $IncludePath = "$InstalledDir\include"
          $LibPath = "$InstalledDir\lib"
          $BinPath = "$InstalledDir\bin"

          Add-Content -Path $env:GITHUB_ENV -Value "FFMPEG_DIR=$InstalledDir"
          Add-Content -Path $env:GITHUB_ENV -Value "FFMPEG_INCLUDE_DIR=$IncludePath"
          Add-Content -Path $env:GITHUB_ENV -Value "FFMPEG_LIB_DIR=$LibPath"
          Add-Content -Path $env:GITHUB_ENV -Value "FFMPEG_VERSION=7.1"

          # CRITICAL FIX for Clang/Bindgen on Windows:
          $ClangArgs = "-I`"$IncludePath`""

          if ($env:INCLUDE) {
            foreach ($p in ($env:INCLUDE -split ';')) {
              $trimmed = $p.Trim()
              if ($trimmed) {
                $fullPath = [System.IO.Path]::GetFullPath($trimmed)
                $ClangArgs += " -I`"$fullPath`""
              }
            }
          }

          Add-Content -Path $env:GITHUB_ENV -Value "BINDGEN_EXTRA_CLANG_ARGS=$ClangArgs"
          Add-Content -Path $env:GITHUB_PATH -Value "$BinPath"

      - name: Install cargo-wix
        run: |
          # Use binstall if available or cargo install
          cargo install cargo-wix --locked || true

      - name: Build (Release)
        shell: pwsh
        run: |
          cargo build --release -p mapmap --features "audio,ffmpeg" --verbose

      - name: Prepare Release Folder & Copy DLLs
        shell: pwsh
        run: |
          $ReleaseDir = "target/release"
          $VcpkgBin = "vcpkg/installed/x64-windows/bin"
          Copy-Item "$VcpkgBin/*.dll" "$ReleaseDir/" -Force

      - name: Create ZIP Artifact
        shell: pwsh
        run: |
          $Version = "${{ inputs.version }}"
          $ZipName = "MapFlow-$Version-Windows-x64.zip"
          Compress-Archive -Path "target/release/MapFlow.exe", "target/release/*.dll" -DestinationPath "$ZipName"
          Add-Content -Path $env:GITHUB_ENV -Value "ZIP_PATH=$ZipName"

      - name: Build MSI Installer
        shell: pwsh
        run: |
          cargo wix --release -p mapmap --no-check-includes
          $MsiPath = Get-ChildItem -Path "target/wix/*.msi" | Select-Object -First 1 -ExpandProperty FullName
          Move-Item -Path $MsiPath -Destination "MapFlow-${{ inputs.version }}-x64.msi"

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-artifacts
          path: |
            MapFlow-${{ inputs.version }}-Windows-x64.zip
            MapFlow-${{ inputs.version }}-x64.msi

  build-linux:
    name: "Build (Linux x64)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo Registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install System Dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            build-essential pkg-config clang libclang-dev \
            libasound2-dev libavcodec-dev libavformat-dev libavutil-dev \
            libswscale-dev libavdevice-dev libavfilter-dev libswresample-dev \
            libpostproc-dev libavcodec-extra \
            libudev-dev libx11-dev libxcursor-dev libxi-dev libxrandr-dev \
            libxinerama-dev libwayland-dev libxkbcommon-dev libssl-dev \
            ffmpeg
      - name: Build (Release)
        run: cargo build --release -p mapmap --features "audio,ffmpeg"
      - name: Create Tarball
        run: |
          VERSION="${{ inputs.version }}"
          TAR_NAME="MapFlow-$VERSION-Linux-x64.tar.gz"
          cd target/release
          tar -czf "../../$TAR_NAME" MapFlow
      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-artifacts
          path: MapFlow-${{ inputs.version }}-Linux-x64.tar.gz

  publish-release:
    name: "Publish Release"
    needs: [build-windows, build-linux]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true
      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ inputs.version }}" \
            --title "MapFlow ${{ inputs.version }}" \
            --generate-notes \
            ${{ inputs.is_prerelease && '--prerelease' || '' }} \
            MapFlow-${{ inputs.version }}-Windows-x64.zip \
            MapFlow-${{ inputs.version }}-x64.msi \
            MapFlow-${{ inputs.version }}-Linux-x64.tar.gz
