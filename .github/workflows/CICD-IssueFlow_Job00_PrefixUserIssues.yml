name: "CICD-IssueFlow: Job00 NormalizeUserIssues"

on:
  issues:
    types: [opened, edited, labeled]

permissions:
  issues: write

jobs:
  normalize-user-issue:
    name: Normalize queued user issue title
    runs-on: ubuntu-latest
    if: github.event.action == 'opened' || github.event.action == 'edited' || github.event.label.name == 'Todo-UserISU'

    steps:
      - name: Normalize Todo-UserISU issue title
        uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue;
            if (!issue) {
              console.log('No issue payload present.');
              return;
            }

            const labels = (issue.labels || [])
              .map((label) => typeof label === 'string' ? label : label.name)
              .filter(Boolean);

            if (!labels.includes('Todo-UserISU')) {
              console.log('Issue is not in the user queue.');
              return;
            }

            let normalizedTitle = String(issue.title || '')
              .replace(/^\s*(?:MFuser_|MFusr_|MFsub_|MF_)\s*#?\d+\s*[-:_ ]\s*/i, '')
              .replace(/^\s*#\d+\s*[-:_ ]\s*/i, '')
              .replace(/^\[(Bug|Feature|Task)\]:\s*/i, '')
              .replace(/\s+/g, ' ')
              .trim();

            if (!normalizedTitle) {
              normalizedTitle = 'User Issue';
            }

            if (normalizedTitle === issue.title) {
              console.log('Issue title already normalized.');
              return;
            }

            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
              title: normalizedTitle,
            });

            console.log(`Renamed issue #${issue.number} to "${normalizedTitle}".`);
