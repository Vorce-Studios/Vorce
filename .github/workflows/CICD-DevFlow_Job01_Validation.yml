name: "CICD-DevFlow: Job01 Validation"

on:
  push:
    branches: ["main"]
    paths-ignore:
      - "**.md"
      - "docs/**"
      - "assets/**"
      - ".vscode/**"
  pull_request:
  workflow_dispatch:
    inputs:
      toolchain:
        description: "Rust toolchain version"
        required: true
        default: "stable"
  workflow_call:
    inputs:
      toolchain:
        description: "Rust toolchain version"
        required: false
        type: string
        default: "stable"

permissions:
  contents: write
  checks: write
  statuses: write
  pull-requests: write
  issues: write
  security-events: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  quality:
    name: "Quality Gate (Format & Lint)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Set up Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ inputs.toolchain || github.event.inputs.toolchain || 'stable' }}
          components: rustfmt, clippy
      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
      - name: Install System Deps (Ubuntu)
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential pkg-config clang libclang-dev yasm nasm libfontconfig1-dev libfreetype6-dev libxcb1-dev libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev libx11-dev libasound2-dev libudev-dev libavcodec-dev libavformat-dev libavutil-dev libswscale-dev libavdevice-dev libavfilter-dev libswresample-dev ffmpeg
      - name: Check Formatting
        run: cargo fmt --all -- --check
      - name: Check Clippy
        run: cargo clippy --workspace --all-targets --features "mapmap-io/ci-linux,ffmpeg" -- -D warnings

  security:
    name: "Security Scan"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Set up Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ inputs.toolchain || github.event.inputs.toolchain || 'stable' }}
      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
      - name: Install Tools
        uses: cargo-bins/cargo-binstall@main
      - name: Install cargo-deny
        run: cargo binstall cargo-deny --no-confirm
      - name: Run Advisory Check
        run: cargo deny check advisories

  build-linux:
    name: "Build & Test (Linux)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Set up Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ inputs.toolchain || github.event.inputs.toolchain || 'stable' }}
      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
      - name: Install System Dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y build-essential pkg-config clang libclang-dev yasm nasm libfontconfig1-dev libfreetype6-dev libxcb1-dev libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev libx11-dev libasound2-dev libudev-dev libavcodec-dev libavformat-dev libavutil-dev libswscale-dev libavdevice-dev libavfilter-dev libswresample-dev libudev-dev ffmpeg
      - name: Build
        run: cargo build --verbose --features "mapmap-io/ci-linux,ffmpeg"
      - name: Test
        run: cargo test --workspace --features "mapmap-io/ci-linux,ffmpeg"

  build-windows:
    name: "Build & Test (Windows)"
    runs-on: windows-latest
    if: |
      github.ref == 'refs/heads/main' ||
      contains(github.event.pull_request.labels.*.name, 'test-windows')
    steps:
      - uses: actions/checkout@v5
      - name: Set up Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ inputs.toolchain || github.event.inputs.toolchain || 'stable' }}
      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
      - name: Build
        run: cargo build --release --verbose --no-default-features --features "audio"

  build-macos:
    name: "Build (macOS Beta)"
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5
      - name: Set up Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ inputs.toolchain || github.event.inputs.toolchain || 'stable' }}
      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
      - name: Build
        run: cargo build --release -p mapmap --no-default-features --features "macos-beta"

  validation-success:
    name: "Validation Success"
    runs-on: ubuntu-latest
    needs: [quality, security, build-linux, build-windows, build-macos]
    if: always()
    steps:
      - name: Check Results
        run: |
          echo "Quality: ${{ needs.quality.result }}"
          echo "Security: ${{ needs.security.result }}"
          echo "Linux: ${{ needs.build-linux.result }}"
          echo "Windows: ${{ needs.build-windows.result }}"
          echo "macOS: ${{ needs.build-macos.result }}"

          if [ "${{ needs.quality.result }}" != "success" ]; then exit 1; fi
          if [ "${{ needs.security.result }}" != "success" ]; then exit 1; fi
          if [ "${{ needs.build-linux.result }}" != "success" ]; then exit 1; fi
          if [ "${{ needs.build-windows.result }}" != "success" ] && [ "${{ needs.build-windows.result }}" != "skipped" ]; then exit 1; fi
          if [ "${{ needs.build-macos.result }}" != "success" ]; then exit 1; fi
          echo "All Validation Checks Passed"
