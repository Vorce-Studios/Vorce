name: "CICD-DevFlow: Job01 Validation"

on:
  push:
    branches: [ "main" ]
  pull_request:
  workflow_dispatch:

permissions:
  contents: write
  checks: write
  statuses: write
  pull-requests: write
  issues: write
  security-events: write

jobs:
  # 1. Quality Gate (Format & Lint)
  quality:
    name: "Quality Gate (Format & Lint)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Install System Deps (Ubuntu)
        run: |
          sudo apt-get update
          sudo apt-get install -y libasound2-dev libudev-dev pkg-config clang libclang-dev libavcodec-dev libavformat-dev libavutil-dev libswscale-dev libavdevice-dev libavfilter-dev libswresample-dev libudev-dev ffmpeg
      - name: Check Formatting
        run: cargo fmt --all -- --check
      - name: Check Clippy
        run: cargo clippy --workspace --all-targets --features "mapmap-io/ci-linux,ffmpeg" -- -D warnings

  # 2. Security Scan
  security:
    name: "Security Scan"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Install Tools
        uses: cargo-bins/cargo-binstall@main
      - name: Install cargo-audit
        run: cargo binstall -y cargo-audit
      - name: Run Audit
        run: cargo audit --ignore RUSTSEC-2024-0370 --ignore RUSTSEC-2025-0141 --ignore RUSTSEC-2024-0436

  # 3. Build & Test (Linux)
  build-linux:
    name: "Build & Test (Linux)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Install System Dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y build-essential pkg-config clang libclang-dev yasm nasm libfontconfig1-dev libfreetype6-dev libxcb1-dev libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev libx11-dev libasound2-dev libudev-dev libavcodec-dev libavformat-dev libavutil-dev libswscale-dev libavdevice-dev libavfilter-dev libswresample-dev libudev-dev ffmpeg
      - name: Build (Release)
        run: cargo build --release --verbose --features "mapmap-io/ci-linux,ffmpeg"
      - name: Test
        run: cargo test --release --workspace --features "mapmap-io/ci-linux,ffmpeg"

  # 4. Build & Test (Windows) - Optional for PRs, but must match name
  build-windows:
    name: "Build & Test (Windows)"
    runs-on: windows-latest
    if: |
      github.ref == 'refs/heads/main' ||
      contains(github.event.pull_request.labels.*.name, 'test-windows')
    steps:
      - uses: actions/checkout@v4
      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Build
        run: cargo build --release --verbose --no-default-features --features "audio"

  # 5. Validation Success (Der finale Check)
  validation-success:
    name: "Validation Success"
    runs-on: ubuntu-latest
    needs: [quality, security, build-linux, build-windows]
    if: always()
    steps:
      - name: Check Results
        run: |
          echo "Quality: ${{ needs.quality.result }}"
          echo "Security: ${{ needs.security.result }}"
          echo "Linux: ${{ needs.build-linux.result }}"
          echo "Windows: ${{ needs.build-windows.result }}"

          if [ "${{ needs.quality.result }}" != "success" ]; then exit 1; fi
          if [ "${{ needs.security.result }}" != "success" ]; then exit 1; fi
          if [ "${{ needs.build-linux.result }}" != "success" ]; then exit 1; fi
          if [ "${{ needs.build-windows.result }}" == "failure" ]; then exit 1; fi
          echo "✅ All Validation Checks Passed"
