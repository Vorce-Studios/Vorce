name: "CICD-DevFlow: Job01 Validation"

on:
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:
    inputs:
      toolchain:
        description: "Rust toolchain version"
        required: true
        default: "1.94.0"
  workflow_call:
    inputs:
      toolchain:
        description: "Rust toolchain version"
        required: false
        type: string
        default: "1.94.0"

concurrency:
  group: validation-${{ github.event.pull_request.number || github.ref || github.run_id }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  RUST_TOOLCHAIN: ${{ inputs.toolchain || github.event.inputs.toolchain || '1.94.0' }}

jobs:
  quality:
    name: "Quality Gate (Format & Lint)"
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          components: rustfmt, clippy

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            pkg-config \
            clang \
            libclang-dev \
            yasm \
            nasm \
            libfontconfig1-dev \
            libfreetype6-dev \
            libxcb1-dev \
            libxcb-render0-dev \
            libxcb-shape0-dev \
            libxcb-xfixes0-dev \
            libx11-dev \
            libxkbcommon-x11-0 \
            libasound2-dev \
            libudev-dev \
            libavcodec-dev \
            libavformat-dev \
            libavutil-dev \
            libswscale-dev \
            libavdevice-dev \
            libavfilter-dev \
            libswresample-dev \
            ffmpeg

      - name: Check Formatting
        run: cargo fmt --all -- --check

      - name: Check Clippy
        run: cargo clippy --workspace --all-targets --features "mapmap-io/ci-linux,ffmpeg" -- -D warnings

  security:
    name: "Security Scan"
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2

      - name: Install cargo-binstall
        uses: cargo-bins/cargo-binstall@main

      - name: Install cargo-deny
        run: |
          cargo binstall -y cargo-deny --force
          test -x "${CARGO_HOME}/bin/cargo-deny"
          "${CARGO_HOME}/bin/cargo-deny" --version

      - name: Run Advisory Check
        run: |
          "${CARGO_HOME}/bin/cargo-deny" check advisories

  build-linux:
    name: "Build & Test (Linux)"
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2

      - name: Install System Dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            build-essential \
            pkg-config \
            clang \
            libclang-dev \
            yasm \
            nasm \
            libfontconfig1-dev \
            libfreetype6-dev \
            libxcb1-dev \
            libxcb-render0-dev \
            libxcb-shape0-dev \
            libxcb-xfixes0-dev \
            libx11-dev \
            libxkbcommon-x11-0 \
            libasound2-dev \
            libudev-dev \
            libavcodec-dev \
            libavformat-dev \
            libavutil-dev \
            libswscale-dev \
            libavdevice-dev \
            libavfilter-dev \
            libswresample-dev \
            ffmpeg

      - name: Build
        run: cargo build --workspace --verbose --features "mapmap-io/ci-linux,ffmpeg"

      - name: Test
        run: cargo test --workspace --features "mapmap-io/ci-linux,ffmpeg"

  build-windows:
    name: "Build & Test (Windows)"
    runs-on: windows-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build --release --verbose --no-default-features --features "audio"

  validation-success:
    name: "Validation Success"
    runs-on: ubuntu-latest
    needs: [quality, security, build-linux, build-windows]
    if: always()
    timeout-minutes: 10

    steps:
      - name: Check Results
        run: |
          echo "Quality: ${{ needs.quality.result }}"
          echo "Security: ${{ needs.security.result }}"
          echo "Linux: ${{ needs.build-linux.result }}"
          echo "Windows: ${{ needs.build-windows.result }}"

          if [ "${{ needs.quality.result }}" != "success" ]; then exit 1; fi
          if [ "${{ needs.security.result }}" != "success" ]; then exit 1; fi
          if [ "${{ needs.build-linux.result }}" != "success" ]; then exit 1; fi
          if [ "${{ needs.build-windows.result }}" != "success" ]; then exit 1; fi

          echo "All Validation Checks Passed"
