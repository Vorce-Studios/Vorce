name: "CICD-DevFlow: Job00 Pre-Commit Lite"

on:
  pull_request_target:
    types: [labeled, opened, reopened, synchronize, ready_for_review]
    branches: [main]
  workflow_dispatch:
    inputs:
      pr_number:
        description: "Pull request number to autofix"
        required: true
        type: string

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: pre-commit-lite-${{ github.event.number || github.event.inputs.pr_number || github.run_id }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  RUST_TOOLCHAIN: ${{ vars.VORCE_DEFAULT_TOOLCHAIN || vars.MAPFLOW_DEFAULT_TOOLCHAIN || '1.94.0' }}
  CARGO_SORT_VERSION: "2.1.3"

jobs:
  rust-autofix:
    name: "Rust Autofix"
    if: github.event_name == 'workflow_dispatch' || github.event.action != 'labeled' || github.event.label.name == 'pre-commit ci run'
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Resolve PR context
        id: resolve
        uses: actions/github-script@v8
        with:
          script: |
            let prNumber = context.payload.pull_request?.number;
            const manualPrNumber = context.payload.inputs?.pr_number;

            if (!prNumber && manualPrNumber) {
              const parsedPrNumber = Number.parseInt(manualPrNumber, 10);
              if (!Number.isNaN(parsedPrNumber)) {
                prNumber = parsedPrNumber;
              }
            }

            if (!prNumber) {
              core.setFailed('Keine PR-Nummer verfügbar.');
              return;
            }

            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber,
            });

            core.setOutput('pr_number', String(pr.number));
            core.setOutput('head_repo', pr.head.repo.full_name);
            core.setOutput('head_ref', pr.head.ref);
            core.setOutput('head_sha', pr.head.sha);
            core.setOutput('base_sha', pr.base.sha);

      - name: Remove manual rerun label
        if: github.event_name == 'pull_request_target' && github.event.action == 'labeled' && github.event.label.name == 'pre-commit ci run'
        continue-on-error: true
        run: gh pr edit ${{ steps.resolve.outputs.pr_number }} --remove-label 'pre-commit ci run'
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Checkout trusted base config
        uses: actions/checkout@v6
        with:
          ref: ${{ steps.resolve.outputs.base_sha }}
          path: base-config

      - name: Checkout PR head
        uses: actions/checkout@v6
        with:
          repository: ${{ steps.resolve.outputs.head_repo }}
          ref: ${{ steps.resolve.outputs.head_ref }}
          path: pr
          fetch-depth: 0
          persist-credentials: false

      - name: Fetch base commit
        working-directory: pr
        shell: bash
        run: |
          git remote add upstream "https://github.com/${{ github.repository }}.git"
          git fetch --no-tags --depth=1 upstream "${{ steps.resolve.outputs.base_sha }}"

      - name: Copy trusted pre-commit config
        shell: bash
        run: |
          cp base-config/.pre-commit-config.yaml pr/.pre-commit-config.yaml

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          components: rustfmt

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2

      - name: Install cargo-sort
        run: cargo install cargo-sort --version ${{ env.CARGO_SORT_VERSION }} --locked

      - name: Install pre-commit
        run: python -m pip install --upgrade pip pre-commit

      - name: Run Rust autofix hooks
        id: rust_hooks
        continue-on-error: true
        working-directory: pr
        shell: bash
        run: |
          status=0

          pre-commit run fmt \
            --show-diff-on-failure \
            --color always \
            --from-ref "${{ steps.resolve.outputs.base_sha }}" \
            --to-ref "${{ steps.resolve.outputs.head_sha }}" || status=$?

          pre-commit run cargo-sort \
            --show-diff-on-failure \
            --color always \
            --from-ref "${{ steps.resolve.outputs.base_sha }}" \
            --to-ref "${{ steps.resolve.outputs.head_sha }}" || status=$?

          exit $status

      - name: pre-commit-ci-lite autofix
        if: always()
        uses: pre-commit-ci/lite-action@v1.1.0
