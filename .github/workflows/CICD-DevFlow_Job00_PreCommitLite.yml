name: "CICD-DevFlow: Job00 Pre-Commit Lite"

on:
  pull_request:
    types: [labeled, opened, reopened, synchronize, ready_for_review]
    branches: [main]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: pre-commit-lite-${{ github.event.number || github.run_id }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  RUST_TOOLCHAIN: ${{ vars.VORCE_DEFAULT_TOOLCHAIN || vars.MAPFLOW_DEFAULT_TOOLCHAIN || '1.94.0' }}
  CARGO_SORT_VERSION: "2.1.3"

jobs:
  rust-autofix:
    name: "Rust Autofix"
    if: github.event.action != 'labeled' || github.event.label.name == 'pre-commit ci run'
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Remove manual rerun label
        if: github.event.action == 'labeled' && github.event.label.name == 'pre-commit ci run'
        continue-on-error: true
        run: gh pr edit ${{ github.event.number }} --remove-label 'pre-commit ci run'
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Checkout PR head
        uses: actions/checkout@v6
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
          persist-credentials: false

      - name: Fetch base commit
        shell: bash
        run: |
          git remote add upstream "https://github.com/${{ github.repository }}.git"
          git fetch --no-tags --depth=1 upstream "${{ github.event.pull_request.base.sha }}"

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          components: rustfmt

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2

      - name: Install cargo-sort
        run: cargo install cargo-sort --version ${{ env.CARGO_SORT_VERSION }} --locked

      - name: Install pre-commit
        run: python -m pip install --upgrade pip pre-commit

      - name: Run Rust autofix hooks
        id: rust_hooks
        continue-on-error: true
        shell: bash
        run: |
          status=0

          pre-commit run fmt \
            --show-diff-on-failure \
            --color always \
            --from-ref "${{ github.event.pull_request.base.sha }}" \
            --to-ref "${{ github.event.pull_request.head.sha }}" || status=$?

          pre-commit run cargo-sort \
            --show-diff-on-failure \
            --color always \
            --from-ref "${{ github.event.pull_request.base.sha }}" \
            --to-ref "${{ github.event.pull_request.head.sha }}" || status=$?

          exit $status

      - name: pre-commit-ci-lite autofix
        if: always()
        uses: pre-commit-ci/lite-action@v1.1.0
