name: "CICD-DevFlow: Job03 Post-Merge Self-Hosted"

on:
  push:
    branches: [main]
  pull_request_target:
    types: [closed]
  workflow_dispatch:
    inputs:
      pr_number:
        description: "Merged PR number to validate on the self-hosted runner"
        required: false
        type: string
      toolchain:
        description: "Rust toolchain version"
        required: true
        default: "stable"
  workflow_call:
    inputs:
      toolchain:
        description: "Rust toolchain version"
        required: false
        type: string
        default: "stable"

permissions:
  contents: read
  pull-requests: read
  checks: read
  statuses: read
  actions: read

concurrency:
  group: post-merge-self-hosted-${{ github.event.pull_request.number || github.event.inputs.pr_number || github.run_id }}
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  SELF_HOSTED_POST_MERGE_ENABLED: ${{ vars.MAPFLOW_ENABLE_SELF_HOSTED_POST_MERGE || 'false' }}

jobs:
  resolve-context:
    name: "Resolve Post-Merge Context"
    runs-on: ubuntu-latest
    if: vars.MAPFLOW_ENABLE_SELF_HOSTED_POST_MERGE == 'true'
    outputs:
      should_run: ${{ steps.resolve.outputs.should_run }}
      pr_number: ${{ steps.resolve.outputs.pr_number }}
      pr_head_sha: ${{ steps.resolve.outputs.pr_head_sha }}
      merge_commit_sha: ${{ steps.resolve.outputs.merge_commit_sha }}
      checkout_ref: ${{ steps.resolve.outputs.checkout_ref }}

    steps:
      - name: Resolve PR details and activation guard
        id: resolve
        uses: actions/github-script@v7
        env:
          INPUT_PR_NUMBER: ${{ github.event.inputs.pr_number || '' }}
        with:
          script: |
            const enabled = process.env.SELF_HOSTED_POST_MERGE_ENABLED === 'true';
            if (!enabled) {
              core.notice(
                'Self-hosted post-merge workflow ist vorbereitet, aber deaktiviert. Setze das Repository-Variable MAPFLOW_ENABLE_SELF_HOSTED_POST_MERGE=true.',
              );
              core.setOutput('should_run', 'false');
              return;
            }

            // Handle direct push to main
            if (context.eventName === 'push') {
              core.info('Direct push to main detected. Using commit SHA for validation.');
              core.setOutput('should_run', 'true');
              core.setOutput('pr_number', '0'); // Placeholder for direct push
              core.setOutput('pr_head_sha', context.sha);
              core.setOutput('merge_commit_sha', context.sha);
              core.setOutput('checkout_ref', context.sha);
              return;
            }

            let prNumber = context.payload.pull_request?.number;
            if (!prNumber && process.env.INPUT_PR_NUMBER) {
              prNumber = Number.parseInt(process.env.INPUT_PR_NUMBER, 10);
            }
            if (!Number.isInteger(prNumber) || prNumber <= 0) {
              if (context.eventName === 'workflow_dispatch') {
                core.info('Manual dispatch without PR number. Using current SHA.');
                core.setOutput('should_run', 'true');
                core.setOutput('pr_number', '0');
                core.setOutput('pr_head_sha', context.sha);
                core.setOutput('merge_commit_sha', context.sha);
                core.setOutput('checkout_ref', context.sha);
                return;
              }
              core.setFailed('Keine gültige PR-Nummer wurde angegeben.');
              return;
            }
            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber,
            });
            if (!pr.merged && context.eventName !== 'workflow_dispatch') {
              core.notice(`PR #${prNumber} ist nicht gemerged – Self-Hosted-Validation übersprungen.`);
              core.setOutput('should_run', 'false');
              return;
            }
            if (pr.base.ref !== 'main') {
              core.notice(`PR #${prNumber} hat den falschen Target-Branch (${pr.base.ref}) – Validation übersprungen.`);
              core.setOutput('should_run', 'false');
              return;
            }
            const labels = (pr.labels || []).map((label) => label.name);
            if (labels.includes('skip-self-hosted-post-merge')) {
              core.notice(
                `PR #${prNumber} trägt das Label skip-self-hosted-post-merge – Validation übersprungen.`,
              );
              core.setOutput('should_run', 'false');
              return;
            }
            if (!pr.merge_commit_sha) {
              core.setFailed(`PR #${prNumber} hat keinen merge_commit_sha.`);
              return;
            }
            core.setOutput('should_run', 'true');
            core.setOutput('pr_number', String(prNumber));
            core.setOutput('pr_head_sha', pr.head.sha);
            core.setOutput('merge_commit_sha', pr.merge_commit_sha);
            core.setOutput('checkout_ref', pr.merge_commit_sha);

  gate-standard-pr-checks:
    name: "Gate On Standard PR Checks"
    runs-on: ubuntu-latest
    needs: [resolve-context]
    if: vars.MAPFLOW_ENABLE_SELF_HOSTED_POST_MERGE == 'true' && needs.resolve-context.outputs.should_run == 'true' && github.event_name != 'push' && github.event_name != 'workflow_dispatch'

    steps:
      - name: Verify required GitHub-hosted PR checks succeeded
        uses: actions/github-script@v7
        with:
          script: |
            const headSha = `${{ needs.resolve-context.outputs.pr_head_sha }}`;
            const prNumber = `${{ needs.resolve-context.outputs.pr_number }}`;
            const REQUIRED_CHECK_RUNS = [
              { name: 'Quality Gate (Format & Lint)', allowedConclusions: ['success'] },
              { name: 'Security Scan', allowedConclusions: ['success'] },
              { name: 'Build & Test (Linux)', allowedConclusions: ['success'] },
              { name: 'Validation Success', allowedConclusions: ['success'] },
            ];
            const OPTIONAL_CHECK_RUNS = [
              { name: 'Build & Test (Windows)', allowedConclusions: ['success', 'skipped', 'neutral'] },
            ];
            const REQUIRED_STATUSES = [
              { name: 'pre-commit.ci - pr', allowedConclusions: ['success'] },
            ];

            const MAX_ATTEMPTS = 20;
            const DELAY_MS = 30000; // 30 seconds

            for (let attempt = 1; attempt <= MAX_ATTEMPTS; attempt++) {
              core.info(`Prüfung der Checks (Versuch ${attempt}/${MAX_ATTEMPTS})...`);

              const [checks, combinedStatus] = await Promise.all([
                github.rest.checks.listForRef({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  ref: headSha,
                  per_page: 100,
                }),
                github.rest.repos.getCombinedStatusForRef({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  ref: headSha,
                }),
              ]);

              const latestCheckRunsByName = new Map();
              for (const run of checks.data.check_runs.sort((left, right) => {
                const leftTime = Date.parse(left.completed_at || left.started_at || '1970-01-01T00:00:00Z');
                const rightTime = Date.parse(right.completed_at || right.started_at || '1970-01-01T00:00:00Z');
                return rightTime - leftTime;
              })) {
                if (!latestCheckRunsByName.has(run.name)) {
                  latestCheckRunsByName.set(run.name, run);
                }
              }

              const latestStatusesByName = new Map();
              for (const status of combinedStatus.data.statuses) {
                if (!latestStatusesByName.has(status.context)) {
                  latestStatusesByName.set(status.context, status);
                }
              }

              const failures = [];
              let anyInProgress = false;

              for (const expected of REQUIRED_CHECK_RUNS) {
                const match = latestCheckRunsByName.get(expected.name);
                if (!match) {
                  failures.push(`${expected.name} (missing)`);
                  continue;
                }
                if (match.status !== 'completed') {
                  anyInProgress = true;
                  continue;
                }
                if (!expected.allowedConclusions.includes(match.conclusion)) {
                  failures.push(`${expected.name} (${match.conclusion})`);
                }
              }

              for (const optional of OPTIONAL_CHECK_RUNS) {
                const match = latestCheckRunsByName.get(optional.name);
                if (match && match.status !== 'completed') {
                  anyInProgress = true;
                }
              }

              for (const expected of REQUIRED_STATUSES) {
                const match = latestStatusesByName.get(expected.name);
                if (match) {
                  const status = match.state === 'pending' ? 'in_progress' : 'completed';
                  if (status === 'in_progress') {
                    anyInProgress = true;
                  } else if (!expected.allowedConclusions.includes(match.state)) {
                    failures.push(`${expected.name} (${match.state})`);
                  }
                } else {
                  failures.push(`${expected.name} (missing)`);
                }
              }

              if (!anyInProgress) {
                if (failures.length > 0) {
                  core.setFailed(`Anforderungen nicht erfüllt: ${failures.join(', ')}`);
                  return;
                }
                core.notice(`Alle erforderlichen Checks für PR #${prNumber} sind abgeschlossen und erfolgreich.`);
                return;
              }

              if (attempt < MAX_ATTEMPTS) {
                core.info(`Einige Checks laufen noch. Warte ${DELAY_MS / 1000}s...`);
                await new Promise(resolve => setTimeout(resolve, DELAY_MS));
              } else {
                core.setFailed(`Zeitüberschreitung: Erforderliche Checks für PR #${prNumber} wurden nicht rechtzeitig abgeschlossen.`);
              }
            }

  self-hosted-post-merge:
    name: "Self-Hosted Post-Merge Validation"
    runs-on: [self-hosted, Windows, X64, mapflow-post-merge]
    needs: [resolve-context, gate-standard-pr-checks]
    if: |
      always() &&
      needs.resolve-context.result == 'success' &&
      (needs.gate-standard-pr-checks.result == 'success' || needs.gate-standard-pr-checks.result == 'skipped') &&
      vars.MAPFLOW_ENABLE_SELF_HOSTED_POST_MERGE == 'true' &&
      needs.resolve-context.outputs.should_run == 'true'
    timeout-minutes: 120

    steps:
      - name: Force Git Bash in PATH
        shell: powershell
        run: |
          $gitBashPath = "C:\Program Files\Git\bin"
          if (Test-Path $gitBashPath) {
            Write-Host "Adding $gitBashPath to PATH"
            echo "$gitBashPath" >> $env:GITHUB_PATH
          }

      - name: Checkout merged commit from main
        uses: actions/checkout@v5
        with:
          ref: ${{ needs.resolve-context.outputs.checkout_ref }}
          fetch-depth: 0

      - name: Set Rust Toolchain
        shell: powershell
        env:
          toolchain: ${{ inputs.toolchain || vars.MAPFLOW_DEFAULT_TOOLCHAIN || 'stable' }}
          RUNNER_OS: ${{ runner.os }}
        run: |
          if (-not $env:toolchain) {
            Write-Error "'toolchain' ist ein erforderlicher Input"
            exit 1
          }
          Add-Content -Path $env:GITHUB_OUTPUT -Value "toolchain=$($env:toolchain)"

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ inputs.toolchain || vars.MAPFLOW_DEFAULT_TOOLCHAIN || 'stable' }}

      - name: Set up MSVC Developer Command Prompt
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Run post-merge self-hosted validation script
        shell: powershell
        env:
          MAPFLOW_PR_NUMBER: ${{ needs.resolve-context.outputs.pr_number }}
          MAPFLOW_PR_HEAD_SHA: ${{ needs.resolve-context.outputs.pr_head_sha }}
          MAPFLOW_MERGE_COMMIT_SHA: ${{ needs.resolve-context.outputs.merge_commit_sha }}
          MAPFLOW_SELF_HOSTED_RUN_IGNORED_GPU_TESTS: ${{ vars.MAPFLOW_SELF_HOSTED_RUN_IGNORED_GPU_TESTS || 'false' }}
          MAPFLOW_SELF_HOSTED_RUN_VISUAL_AUTOMATION: ${{ vars.MAPFLOW_SELF_HOSTED_RUN_VISUAL_AUTOMATION || 'false' }}
          MAPFLOW_SELF_HOSTED_RUN_PERFORMANCE_CHECK: ${{ vars.MAPFLOW_SELF_HOSTED_RUN_PERFORMANCE_CHECK || 'false' }}
          MAPFLOW_PERFORMANCE_THRESHOLD: ${{ vars.MAPFLOW_PERFORMANCE_THRESHOLD || '' }}
          toolchain: ${{ inputs.toolchain || vars.MAPFLOW_DEFAULT_TOOLCHAIN || 'stable' }}
        run: .\scripts\build\self-hosted-post-merge.ps1

      - name: Upload visual capture artifacts
        if: always() && vars.MAPFLOW_SELF_HOSTED_RUN_VISUAL_AUTOMATION == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: visual-capture-${{ needs.resolve-context.outputs.pr_number }}-${{ github.run_id }}
          path: artifacts/visual-capture
          if-no-files-found: ignore
          retention-days: 14
