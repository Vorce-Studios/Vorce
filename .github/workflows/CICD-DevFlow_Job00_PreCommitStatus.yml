name: "CICD-DevFlow: Job00 Pre-Commit Status"

on:
  pull_request_target:
    types: [opened, reopened, synchronize, ready_for_review]
    branches: [main]
  workflow_dispatch:
    inputs:
      pr_number:
        description: "Optional PR number to re-run the pre-commit status for"
        required: false
        type: string

permissions:
  contents: read
  pull-requests: read
  statuses: write

concurrency:
  group: pre-commit-status-${{ github.event.pull_request.number || github.event.inputs.pr_number || github.run_id }}
  cancel-in-progress: true

jobs:
  pre-commit-status:
    name: "Publish pre-commit status"
    runs-on: ubuntu-latest
    if: github.event.pull_request != null || github.event_name == 'workflow_dispatch'
    timeout-minutes: 20

    steps:
      - name: Resolve PR context
        id: resolve
        uses: actions/github-script@v8
        with:
          script: |
            let prNumber = context.payload.pull_request?.number;
            const manualPrNumber = context.payload.inputs?.pr_number;

            if (!prNumber && manualPrNumber) {
              const parsedPrNumber = Number.parseInt(manualPrNumber, 10);
              if (!Number.isNaN(parsedPrNumber)) {
                prNumber = parsedPrNumber;
              }
            }

            if (!prNumber) {
              core.setFailed('Keine PR-Nummer verfügbar.');
              return;
            }

            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber,
            });
            const files = await github.paginate(github.rest.pulls.listFiles, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber,
              per_page: 100,
            });

            core.setOutput('pr_number', String(pr.number));
            core.setOutput('head_sha', pr.head.sha);
            core.setOutput('head_ref', pr.head.ref);
            core.setOutput('head_repo', pr.head.repo.full_name);
            core.setOutput('base_ref', pr.base.ref);
            core.setOutput(
              'changed_files',
              JSON.stringify(
                files
                  .filter((file) => file.status !== 'removed')
                  .map((file) => file.filename),
              ),
            );

      - name: Publish pending pre-commit status
        uses: actions/github-script@v8
        env:
          HEAD_SHA: ${{ steps.resolve.outputs.head_sha }}
        with:
          script: |
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: process.env.HEAD_SHA,
              state: 'pending',
              context: 'pre-commit.ci - pr',
              description: 'Running pre-commit hooks',
              target_url: `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
            });

      - name: Checkout trusted base config
        uses: actions/checkout@v6
        with:
          ref: ${{ steps.resolve.outputs.base_ref }}
          path: base-config

      - name: Checkout PR head
        uses: actions/checkout@v6
        with:
          repository: ${{ steps.resolve.outputs.head_repo }}
          ref: ${{ steps.resolve.outputs.head_ref }}
          path: pr
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - name: Install pre-commit
        run: python -m pip install --upgrade pip pre-commit

      - name: Copy trusted pre-commit inputs
        shell: bash
        run: |
          cp base-config/.pre-commit-config.yaml pr/.pre-commit-config.yaml
          if [ -f base-config/.markdownlint.json ]; then
            cp base-config/.markdownlint.json pr/.markdownlint.json
          fi
          if [ -f base-config/.secrets.baseline ]; then
            cp base-config/.secrets.baseline pr/.secrets.baseline
          fi

      - name: Run pre-commit
        id: precommit
        working-directory: pr
        continue-on-error: true
        shell: bash
        env:
          CHANGED_FILES_JSON: ${{ steps.resolve.outputs.changed_files }}
        run: |
          mapfile -t changed_files < <(printf '%s' "$CHANGED_FILES_JSON" | jq -r '.[]')
          if [ ${#changed_files[@]} -eq 0 ]; then
            echo "No changed files to scan."
            exit 0
          fi
          pre-commit run --files "${changed_files[@]}" --show-diff-on-failure --color always

      - name: Publish final pre-commit status
        if: always()
        uses: actions/github-script@v8
        env:
          HEAD_SHA: ${{ steps.resolve.outputs.head_sha }}
          PRECOMMIT_OUTCOME: ${{ steps.precommit.outcome }}
        with:
          script: |
            const outcome = process.env.PRECOMMIT_OUTCOME;
            let state = 'error';
            let description = 'pre-commit run did not complete';

            if (outcome === 'success') {
              state = 'success';
              description = 'pre-commit hooks passed';
            } else if (outcome === 'failure') {
              state = 'failure';
              description = 'pre-commit hooks failed';
            } else if (outcome === 'cancelled') {
              state = 'error';
              description = 'pre-commit run cancelled';
            }

            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: process.env.HEAD_SHA,
              state,
              context: 'pre-commit.ci - pr',
              description,
              target_url: `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
            });

            if (state !== 'success') {
              core.setFailed(description);
            }
