name: "CICD-IssueFlow: Job02 ProjectManagerSync"

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:
    inputs:
      issue_number:
        description: "Optional single issue number"
        required: false
        type: string
      stale_after_hours:
        description: "Mark issue as blocked when no update happened for this many hours"
        required: false
        default: "12"
        type: string

permissions:
  contents: read
  issues: write
  pull-requests: read
  repository-projects: write

jobs:
  sync:
    name: Sync Project Manager Tracking
    runs-on: ubuntu-latest
    env:
      JULES_API_KEY: ${{ secrets.JULES_API_KEY }}

    steps:
      - uses: actions/checkout@v6

      - name: Skip when Jules API key is missing
        if: ${{ env.JULES_API_KEY == '' }}
        run: echo "JULES_API_KEY is not configured. Skipping Project Manager sync."

      - name: Sync all tracked issues
        if: ${{ env.JULES_API_KEY != '' }}
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.PROJECT_SYNC_GH_TOKEN || github.token }}
          VORCE_PROJECT_OWNER: ${{ vars.VORCE_PROJECT_OWNER || github.repository_owner }}
          VORCE_PROJECT_NUMBER: ${{ vars.VORCE_PROJECT_NUMBER }}
          VORCE_PROJECT_STATUS_FIELD: ${{ vars.VORCE_PROJECT_STATUS_FIELD }}
          VORCE_PROJECT_QUEUE_STATE_FIELD: ${{ vars.VORCE_PROJECT_QUEUE_STATE_FIELD }}
          VORCE_PROJECT_REMOTE_STATE_FIELD: ${{ vars.VORCE_PROJECT_REMOTE_STATE_FIELD }}
          VORCE_PROJECT_WORK_BRANCH_FIELD: ${{ vars.VORCE_PROJECT_WORK_BRANCH_FIELD }}
          VORCE_PROJECT_LAST_UPDATE_FIELD: ${{ vars.VORCE_PROJECT_LAST_UPDATE_FIELD }}
          VORCE_PROJECT_LINKED_PR_FIELD: ${{ vars.VORCE_PROJECT_LINKED_PR_FIELD }}
        run: |
          $issueNumber = "${{ github.event.inputs.issue_number }}"
          $staleAfterHours = "${{ github.event.inputs.stale_after_hours || '12' }}"

          if ([string]::IsNullOrWhiteSpace($staleAfterHours)) {
            $staleAfterHours = "12"
          }

          if ([string]::IsNullOrWhiteSpace($issueNumber)) {
            ./scripts/jules/sync-project-manager.ps1 `
              -Repository ${{ github.repository }} `
              -ApiKey $env:JULES_API_KEY `
              -StaleAfterHours ([int]$staleAfterHours)
          } else {
            ./scripts/jules/sync-project-manager.ps1 `
              -Repository ${{ github.repository }} `
              -ApiKey $env:JULES_API_KEY `
              -IssueNumber ([int]$issueNumber) `
              -StaleAfterHours ([int]$staleAfterHours)
          }
