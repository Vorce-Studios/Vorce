name: "CICD-IssueFlow: Job02 SessionMonitor (manual diagnostic)"

on:
  workflow_dispatch:
    inputs:
      issue_number:
        description: 'Issue Number'
        required: true
      session_id:
        description: 'Jules Session ID'
        required: true

permissions:
  issues: write
  contents: write
  pull-requests: write
  actions: write

jobs:
  monitor:
    name: Monitor Session
    runs-on: ubuntu-latest
    steps:
      - name: Monitor Logic (Polling)
        uses: actions/github-script@v7
        env:
          JULES_API_KEY: ${{ secrets.JULES_API_KEY }}
          SESSION_ID: ${{ inputs.session_id }}
          ISSUE_NUMBER: ${{ inputs.issue_number }}
        with:
          script: |
            const TRACKER_COMMENT_MARKER = '<!-- maestro-jules-session -->';
            const fetch = globalThis.fetch ?? (await import('node-fetch')).default;
            const sessionId = process.env.SESSION_ID;
            const issueNumber = process.env.ISSUE_NUMBER;
            const today = new Date().toISOString().slice(0, 10);

            console.log(`Monitoring session ${sessionId} for issue #${issueNumber}`);

            function normalizeRemoteState(sessionState, pr) {
              if (pr) {
                if (pr.state === 'MERGED') return 'merged';
                if (pr.state === 'CLOSED') return 'pr_closed';
                if (pr.state === 'OPEN' && pr.isDraft) return 'pr_draft';
                if (pr.state === 'OPEN') return 'pr_open';
              }

              const value = String(sessionState || '').toLowerCase();
              if (/(wait|input|review|question)/.test(value)) return 'jules_waiting';
              if (/(fail|error|cancel|abort)/.test(value)) return 'jules_failed';
              if (/(complete|done|finish|success|submitted)/.test(value)) return 'jules_completed_no_pr';
              if (/(run|progress|active|start|executing)/.test(value)) return 'jules_running';
              if (/(queue|create|new|pending|scheduled)/.test(value)) return 'jules_created';
              return 'unknown';
            }

            const res = await fetch(`https://jules.googleapis.com/v1alpha/${sessionId}`, {
              headers: { 'X-Goog-Api-Key': process.env.JULES_API_KEY },
            });

            if (!res.ok) {
              const body = await res.text();
              throw new Error(`Jules API returned ${res.status}: ${body}`);
            }

            const session = await res.json();
            const search = await github.rest.search.issuesAndPullRequests({
              q: `repo:${context.repo.owner}/${context.repo.repo} is:pr "#${issueNumber}" in:body`,
              per_page: 20,
            });

            const pullRequests = search.data.items || [];
            pullRequests.sort((a, b) => {
              const score = (item) => {
                if (item.state === 'closed' && item.pull_request?.merged_at) return 0;
                if (item.state === 'open') return 1;
                return 2;
              };
              return score(a) - score(b);
            });

            let prUrl = '';
            let workBranch = '';
            let prState = '';
            let isDraft = false;

            if (pullRequests.length > 0) {
              const prNumber = pullRequests[0].number;
              const pr = await github.rest.pulls.get({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: prNumber,
              });
              prUrl = pr.data.html_url || '';
              workBranch = pr.data.head?.ref || '';
              prState = pr.data.merged_at ? 'MERGED' : String(pr.data.state || '').toUpperCase();
              isDraft = Boolean(pr.data.draft);
            }

            const remoteState = normalizeRemoteState(session.state || session.status, prUrl ? { state: prState, isDraft } : null);
            const trackerBody = [
              TRACKER_COMMENT_MARKER,
              '## Jules Session Tracking',
              `- Session ID: \`${sessionId}\``,
              `- Session URL: ${session.url ? `[Open Session](${session.url})` : 'pending'}`,
              `- Pull Request: ${prUrl || 'pending'}`,
              `- Work Branch: ${workBranch ? `\`${workBranch}\`` : 'pending'}`,
              `- Remote State: ${remoteState}`,
              `- Last Update: ${today}`,
            ].join('\n');

            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              per_page: 100,
            });
            const existing = comments.data.find((comment) => (comment.body || '').includes(TRACKER_COMMENT_MARKER));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body: trackerBody,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueNumber,
                body: trackerBody,
              });
            }

            console.log(`Session state: ${session.state || session.status}, PR: ${prUrl || 'none'}`);
