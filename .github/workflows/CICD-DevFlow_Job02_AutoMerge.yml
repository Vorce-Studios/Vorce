name: "CICD-DevFlow: Job02 Auto-Merge"

on:
  pull_request:
    types: [opened, reopened, synchronize, labeled, ready_for_review]
  workflow_run:
    workflows: ["CICD-DevFlow: Job01 Validation", "Security Analysis"]
    types: [completed]
  workflow_dispatch:
    inputs:
      pr_number:
        description: "Optional PR number to re-evaluate manually"
        required: false
        type: string
  status:

env:
  AUTO_MERGE_ENABLED: true

concurrency:
  group: auto-merge-${{ github.event.pull_request.number || github.event.inputs.pr_number || github.event.workflow_run.head_sha || github.event.sha || github.run_id }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write
  issues: write
  checks: read
  statuses: read

jobs:
  auto-merge:
    name: "Auto-Merge"
    runs-on: ubuntu-latest
    if: github.event.pull_request != null || github.event.workflow_run != null || github.event_name == 'status' || github.event_name == 'workflow_dispatch'

    steps:
      - name: Evaluate Auto-Merge Eligibility
        uses: actions/github-script@v7
        with:
          script: |
            if (process.env.AUTO_MERGE_ENABLED !== 'true') {
              console.log('Auto-merge is disabled via AUTO_MERGE_ENABLED');
              return;
            }

            const sleep = (ms) => new Promise((resolve) => setTimeout(resolve, ms));
            const AUTO_MERGE_RESULT_MARKER = '<!-- auto-merge-result -->';

            const buildManagedCommentBody = (message) =>
              `${AUTO_MERGE_RESULT_MARKER}\n${message}`;

            const upsertManagedComment = async (issueNumber, message) => {
              const body = buildManagedCommentBody(message);
              const comments = await github.paginate(github.rest.issues.listComments, {
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueNumber,
                per_page: 100,
              });

              const existingComment = [...comments]
                .reverse()
                .find((comment) => comment.body?.includes(AUTO_MERGE_RESULT_MARKER));

              if (!existingComment) {
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issueNumber,
                  body,
                });
                console.log('Created managed auto-merge comment.');
                return;
              }

              if (existingComment.body === body) {
                console.log(`Managed auto-merge comment ${existingComment.id} is already current.`);
                return;
              }

              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existingComment.id,
                body,
              });
              console.log(`Updated managed auto-merge comment ${existingComment.id}.`);
            };

            const findOpenPrByHeadSha = async (headSha) => {
              const prs = await github.rest.pulls.list({
                owner: context.repo.owner,
                repo: context.repo.repo,
                state: 'open',
                per_page: 100,
              });

              return prs.data.find((pr) => pr.head.sha === headSha);
            };

            const waitForResolvedMergeability = async (pullNumber, initialPr) => {
              let currentPr = initialPr;

              for (let attempt = 1; attempt <= 10; attempt += 1) {
                if (
                  (currentPr.mergeable_state && currentPr.mergeable_state !== 'unknown') ||
                  currentPr.mergeable !== null
                ) {
                  if (attempt > 1) {
                    console.log(
                      `PR mergeability resolved on attempt ${attempt}: mergeable=${currentPr.mergeable}, state=${currentPr.mergeable_state}`,
                    );
                  }
                  return currentPr;
                }

                console.log(
                  `PR mergeability still pending (mergeable=${currentPr.mergeable}, state=${currentPr.mergeable_state}); retrying (${attempt}/10)...`,
                );
                await sleep(2000);

                const refreshedPr = await github.rest.pulls.get({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  pull_number: pullNumber,
                });
                currentPr = refreshedPr.data;
              }

              console.log(
                'PR mergeability is still unknown after waiting. Skipping evaluation until GitHub finishes recomputing it.',
              );
              return null;
            };

            const updateBehindPr = async (currentPr) => {
              console.log('PR is behind the base branch. Requesting branch update and waiting for synchronize.');

              try {
                await github.rest.pulls.updateBranch({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  pull_number: currentPr.number,
                  expected_head_sha: currentPr.head.sha,
                });
                console.log('Branch update requested successfully.');
              } catch (error) {
                console.log(`Branch update failed: ${error.message}`);
              }
            };

            const getExpectedChecks = (pr) => {
              const hasWindowsLabel = (pr.labels || []).some((label) => label.name === 'test-windows');

              return [
                {
                  name: 'pre-commit.ci - pr',
                  source: 'status',
                  allowedConclusions: ['success'],
                  required: true,
                },
                {
                  name: 'Quality Gate (Format & Lint)',
                  source: 'check_run',
                  allowedConclusions: ['success'],
                  required: true,
                },
                {
                  name: 'Security Scan',
                  source: 'check_run',
                  allowedConclusions: ['success'],
                  required: true,
                },
                {
                  name: 'Build & Test (Linux)',
                  source: 'check_run',
                  allowedConclusions: ['success'],
                  required: true,
                },
                {
                  name: 'Validation Success',
                  source: 'check_run',
                  allowedConclusions: ['success'],
                  required: true,
                },
                {
                  name: 'Analyze (rust)',
                  source: 'check_run',
                  allowedConclusions: ['success'],
                  required: true,
                },
                {
                  name: 'Build & Test (Windows)',
                  source: 'check_run',
                  allowedConclusions: ['success', 'skipped', 'neutral'],
                  required: hasWindowsLabel,
                },
              ];
            };

            if (context.eventName === 'status' && context.payload.context !== 'pre-commit.ci - pr') {
              console.log(`Ignoring status event for "${context.payload.context}".`);
              return;
            }

            let prNumber = context.payload.pull_request?.number;
            const manualPrNumber = context.payload.inputs?.pr_number;

            if (!prNumber && manualPrNumber) {
              const parsedPrNumber = Number.parseInt(manualPrNumber, 10);
              if (Number.isNaN(parsedPrNumber)) {
                console.log(`Invalid pr_number input: "${manualPrNumber}"`);
                return;
              }
              prNumber = parsedPrNumber;
            }

            if (!prNumber && context.payload.workflow_run) {
              const headBranch = context.payload.workflow_run.head_branch;
              const headSha = context.payload.workflow_run.head_sha;

              console.log(`Searching for PR with head branch "${headBranch}" and SHA ${headSha}...`);

              const prs = await github.rest.pulls.list({
                owner: context.repo.owner,
                repo: context.repo.repo,
                state: 'open',
                head: `${context.repo.owner}:${headBranch}`,
                per_page: 100,
              });

              const match = prs.data.find((pr) => pr.head.sha === headSha);
              if (match) {
                prNumber = match.number;
              } else if (prs.data.length > 0) {
                prNumber = prs.data[0].number;
              }
            }

            if (!prNumber && context.eventName === 'status') {
              const headSha = context.payload.sha;
              const match = await findOpenPrByHeadSha(headSha);
              if (match) {
                prNumber = match.number;
              }
            }

            if (!prNumber) {
              console.log('No PR found for this event.');
              return;
            }

            console.log(`Checking PR #${prNumber} for auto-merge eligibility...`);

            const initialPrResponse = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber,
            });

            const pr = await waitForResolvedMergeability(prNumber, initialPrResponse.data);
            if (!pr) {
              return;
            }

            if (pr.draft) {
              console.log('PR is a draft. Skipping auto-merge.');
              return;
            }

            if (pr.state === 'closed') {
              console.log('PR is already closed.');
              return;
            }

            console.log(`Mergeable: ${pr.mergeable}, state: ${pr.mergeable_state}`);

            if (pr.mergeable === false) {
              console.log('PR has merge conflicts. Cannot auto-merge.');
              await upsertManagedComment(
                prNumber,
                'Auto-merge ist blockiert, weil der PR Merge-Konflikte enthält. Bitte Branch aktualisieren oder Konflikte manuell auflösen.',
              );
              return;
            }

            if (pr.mergeable_state === 'behind') {
              await updateBehindPr(pr);
              await upsertManagedComment(
                prNumber,
                'Auto-merge wartet, weil der PR hinter `main` liegt. Der Branch wurde zur Aktualisierung angefordert; nach dem nächsten `synchronize`-Event werden die Checks erneut ausgewertet.',
              );
              return;
            }

            await sleep(2000);

            const [checks, combinedStatus] = await Promise.all([
              github.rest.checks.listForRef({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: pr.head.sha,
                per_page: 100,
              }),
              github.rest.repos.getCombinedStatusForRef({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: pr.head.sha,
              }),
            ]);

            console.log(
              `Found ${checks.data.total_count} check run(s) and ${combinedStatus.data.statuses.length} status context(s).`,
            );

            const ownRunId = process.env.GITHUB_RUN_ID;

            const externalRuns = checks.data.check_runs.filter((run) => {
              if (run.name.includes('Auto-Merge')) {
                return false;
              }
              if (ownRunId && run.details_url?.includes(ownRunId)) {
                return false;
              }
              return true;
            });

            const latestRunsByName = new Map();
            for (const run of externalRuns.sort((left, right) => {
              const leftTime = Date.parse(left.completed_at || left.started_at || '1970-01-01T00:00:00Z');
              const rightTime = Date.parse(right.completed_at || right.started_at || '1970-01-01T00:00:00Z');
              return rightTime - leftTime;
            })) {
              if (!latestRunsByName.has(run.name)) {
                latestRunsByName.set(run.name, {
                  name: run.name,
                  source: 'check_run',
                  status: run.status,
                  conclusion: run.conclusion,
                });
              }
            }

            const latestStatusesByName = new Map();
            for (const status of combinedStatus.data.statuses) {
              if (!latestStatusesByName.has(status.context)) {
                latestStatusesByName.set(status.context, {
                  name: status.context,
                  source: 'status',
                  status: status.state === 'pending' ? 'in_progress' : 'completed',
                  conclusion: status.state === 'pending' ? null : status.state,
                });
              }
            }

            const expectedChecks = getExpectedChecks(pr);
            const observedChecks = [
              ...latestRunsByName.values(),
              ...latestStatusesByName.values(),
            ];

            let allRequiredPassed = true;
            const missingOrFailed = [];

            for (const expectedCheck of expectedChecks.filter((check) => check.required)) {
              const match =
                expectedCheck.source === 'status'
                  ? latestStatusesByName.get(expectedCheck.name)
                  : latestRunsByName.get(expectedCheck.name);

              if (!match) {
                console.log(`Required check "${expectedCheck.name}" not found yet.`);
                allRequiredPassed = false;
                missingOrFailed.push(`${expectedCheck.name} (missing)`);
                continue;
              }

              console.log(
                `  - ${expectedCheck.name}: source=${match.source}, status=${match.status}, conclusion=${match.conclusion}`,
              );

              if (match.status !== 'completed') {
                allRequiredPassed = false;
                missingOrFailed.push(`${expectedCheck.name} (${match.status})`);
                continue;
              }

              if (!expectedCheck.allowedConclusions.includes(match.conclusion)) {
                allRequiredPassed = false;
                missingOrFailed.push(`${expectedCheck.name} (${match.conclusion})`);
              }
            }

            if (!allRequiredPassed) {
              const message =
                `Auto-merge wartet noch auf erfolgreiche Pflicht-Checks: ${missingOrFailed.join(', ')}.`;

              console.log(message);
              await upsertManagedComment(prNumber, message);
              return;
            }

            const otherFailed = observedChecks.filter(
              (check) =>
                !expectedChecks.some((expectedCheck) => expectedCheck.name === check.name) &&
                check.status === 'completed' &&
                ['failure', 'timed_out', 'cancelled', 'error'].includes(check.conclusion),
            );

            if (otherFailed.length > 0) {
              console.log('Non-required checks failed:');
              otherFailed.forEach((check) => console.log(`  - ${check.name}: ${check.conclusion}`));
            }

            const refreshedPrResponse = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber,
            });

            const finalPr = await waitForResolvedMergeability(prNumber, refreshedPrResponse.data);
            if (!finalPr) {
              return;
            }

            if (finalPr.state === 'closed') {
              console.log('PR became closed before merge attempt.');
              return;
            }

            if (finalPr.draft) {
              console.log('PR became draft before merge attempt.');
              return;
            }

            if (finalPr.mergeable === false) {
              console.log('PR developed merge conflicts before merge attempt.');
              await upsertManagedComment(
                prNumber,
                'Auto-merge wurde abgebrochen, weil vor dem Merge-Versuch Merge-Konflikte erkannt wurden.',
              );
              return;
            }

            if (finalPr.mergeable_state === 'behind') {
              await updateBehindPr(finalPr);
              await upsertManagedComment(
                prNumber,
                'Auto-merge wurde verschoben, weil der PR vor dem Merge erneut hinter `main` lag.',
              );
              return;
            }

            if (finalPr.mergeable_state === 'blocked') {
              console.log(
                "PR mergeable_state is 'blocked' despite all required checks passing. Attempting merge and letting GitHub enforce branch protection.",
              );
            } else {
              console.log(`Final pre-merge state: mergeable=${finalPr.mergeable}, state=${finalPr.mergeable_state}`);
            }

            console.log('All conditions met. Initiating auto-merge...');

            try {
              await github.rest.pulls.merge({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: prNumber,
                merge_method: 'squash',
                commit_title: `${finalPr.title} (#${prNumber})`,
                commit_message: `${finalPr.body || ''}\n\nAuto-merged by GitHub Actions`,
              });

              console.log('PR merged successfully.');

              await upsertManagedComment(
                prNumber,
                'Auto-merged by the CI pipeline after all required checks passed.',
              );
            } catch (error) {
              console.log(`Merge failed: ${error.message}`);

              await upsertManagedComment(
                prNumber,
                `Auto-merge failed: ${error.message}\n\nPlease merge manually.`,
              );
            }
