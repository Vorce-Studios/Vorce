name: "CICD-DevFlow: Job02 Auto-Merge"

on:
  workflow_run:
    workflows: ["CICD-DevFlow: Job01 Validation"]
    types: [completed]

permissions:
  contents: write
  pull-requests: write
  actions: read

jobs:
  auto-merge:
    name: "Auto-Merge"
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Attempt Auto-Merge
        shell: bash
        run: |
          # Get the PR number associated with the workflow run
          PR_NUMBER=$(gh pr list --head "${{ github.event.workflow_run.head_branch }}" --json number --jq '.[0].number')

          if [ -n "$PR_NUMBER" ]; then
            echo "Merging PR #$PR_NUMBER..."
            gh pr merge "$PR_NUMBER" --squash --delete-branch || echo "Merge failed or already merged."
          else
            echo "No PR found for branch ${{ github.event.workflow_run.head_branch }}"
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
