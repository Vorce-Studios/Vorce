name: "CICD-DevFlow: Job02 Auto-Merge"

on:
  pull_request:
    types: [labeled, synchronize, opened, reopened]
  check_suite:
    types: [completed]
  workflow_run:
    workflows: ["CICD-DevFlow: Job01 Validation"]
    types: [completed]

env:
  # Master Switch
  AUTO_MERGE_ENABLED: true

permissions:
  contents: write
  pull-requests: write
  issues: write
  checks: read

jobs:
  auto-merge:
    name: Auto-Merge
    runs-on: ubuntu-latest
    if: github.event.pull_request != null || github.event.workflow_run != null || github.event.check_suite != null
    steps:
      - name: Auto-Merge Logic
        uses: actions/github-script@v7
        with:
          script: |
            if (process.env.AUTO_MERGE_ENABLED !== 'true') {
              console.log("⚠️ Auto-merge is disabled via AUTO_MERGE_ENABLED");
              return;
            }

            // ═══════════════════════════════════════════════════════════════
            // 1. IDENTIFY PR
            // ═══════════════════════════════════════════════════════════════
            let prNumber = context.payload.pull_request?.number;

            // If triggered by workflow_run, find PR associated with commit
            if (!prNumber && context.payload.workflow_run) {
              const prs = await github.rest.pulls.list({
                owner: context.repo.owner,
                repo: context.repo.repo,
                state: 'open',
                head: `${context.repo.owner}:${context.payload.workflow_run.head_branch}`
              });
              if (prs.data.length > 0) prNumber = prs.data[0].number;
            }

            // If triggered by check_suite
            if (!prNumber && context.payload.check_suite) {
              const prs = await github.rest.pulls.list({
                owner: context.repo.owner,
                repo: context.repo.repo,
                state: 'open'
              });
              // Filter by SHA
              const match = prs.data.find(p => p.head.sha === context.payload.check_suite.head_sha);
              if (match) prNumber = match.number;
            }

            if (!prNumber) {
              console.log("ℹ️ No PR found for this event.");
              return;
            }

            console.log(`🔍 Checking PR #${prNumber} for Auto-Merge eligibility...`);

            // ═══════════════════════════════════════════════════════════════
            // 2. GET PR DATA
            // ═══════════════════════════════════════════════════════════════
            const pr = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber
            });

            // ═══════════════════════════════════════════════════════════════
            // 3. PRE-CHECKS
            // ═══════════════════════════════════════════════════════════════

            // Check: Draft PR
            if (pr.data.draft) {
              console.log("❌ PR is a draft. Skipping auto-merge.");
              return;
            }

            // Check: Mergeable state
            if (pr.data.mergeable === false) {
              console.log("❌ PR has merge conflicts. Cannot auto-merge.");
              return;
            }

            if (pr.data.mergeable_state === 'dirty') {
              console.log("❌ PR mergeable_state is 'dirty'. Skipping auto-merge.");
              return;
            }

            // Check: Already merged
            if (pr.data.merged) {
              console.log("ℹ️ PR is already merged.");
              return;
            }

            // Check: Closed
            if (pr.data.state === 'closed') {
              console.log("ℹ️ PR is closed.");
              return;
            }

            // ═══════════════════════════════════════════════════════════════
            // 4. CHECK STATUS CHECKS (mit Self-Exclusion & Neutral-Toleranz)
            // ═══════════════════════════════════════════════════════════════

            console.log(`📊 Fetching check suites for commit ${pr.data.head.sha}...`);

            const suites = await github.rest.checks.listSuitesForRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: pr.data.head.sha
            });

            console.log(`Found ${suites.data.total_count} check suite(s)`);

            // If no checks exist at all, this might be a docs-only change
            // We still allow merge (you can change this behavior if needed)
            if (suites.data.total_count === 0) {
              console.log("⚠️ No check suites found. This might be a documentation-only PR.");
              console.log("✅ Proceeding with merge (no checks to fail).");
            } else {
              // ── FIX: Eigene Check-Suite aus der Prüfung ausschließen ──
              // Der Auto-Merge-Workflow erzeugt selbst eine Check-Suite.
              // Diese muss ignoriert werden, sonst entsteht ein Deadlock
              // (der Workflow wartet auf sich selbst).
              const ownRunId = process.env.GITHUB_RUN_ID;
              const ownAppSlug = 'github-actions';

              // Ermittle die Check-Suite-ID dieses Workflow-Runs
              let ownSuiteId = null;
              if (ownRunId) {
                try {
                  const ownRun = await github.rest.actions.getWorkflowRun({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    run_id: parseInt(ownRunId)
                  });
                  ownSuiteId = ownRun.data.check_suite_id;
                  console.log(`🔄 Own check suite ID: ${ownSuiteId} (will be excluded from checks)`);
                } catch (e) {
                  console.log(`⚠️ Could not determine own suite ID: ${e.message}`);
                }
              }

              // Filtere die eigene Suite heraus
              const externalSuites = suites.data.check_suites.filter(s => {
                if (ownSuiteId && s.id === ownSuiteId) {
                  console.log(`  ⏭️ Skipping own check suite (ID: ${s.id})`);
                  return false;
                }
                return true;
              });

              const totalExternal = externalSuites.length;
              console.log(`📊 Evaluating ${totalExternal} external check suite(s) (excluded own)`);

              if (totalExternal === 0) {
                console.log("⚠️ No external check suites found. Proceeding with merge.");
              } else {
                // Check for failures
                const failed = externalSuites.filter(s =>
                  s.conclusion === 'failure' ||
                  s.conclusion === 'timed_out' ||
                  s.conclusion === 'cancelled'
                );

                if (failed.length > 0) {
                  console.log(`❌ ${failed.length} check suite(s) failed:`);
                  failed.forEach(s => console.log(`  - ${s.app?.name || 'unknown'}: ${s.conclusion}`));
                  return;
                }

                // Check for pending/in-progress
                const pending = externalSuites.filter(s =>
                  s.status === 'in_progress' ||
                  s.status === 'queued' ||
                  s.status === 'waiting'
                );

                if (pending.length > 0) {
                  console.log(`⏳ ${pending.length} check suite(s) still running:`);
                  pending.forEach(s => console.log(`  - ${s.app?.name || 'unknown'}: ${s.status}`));
                  return;
                }

                // ── FIX: "neutral" und "skipped" als gültig akzeptieren ──
                // Optionale Jobs (z.B. Windows-Build ohne Label) erzeugen
                // conclusion "neutral" oder "skipped". Das ist kein Fehler.
                const acceptable = externalSuites.filter(s =>
                  s.conclusion === 'success' ||
                  s.conclusion === 'neutral' ||
                  s.conclusion === 'skipped'
                );

                const completed = externalSuites.filter(s =>
                  s.status === 'completed'
                );

                console.log(`✅ ${acceptable.length}/${totalExternal} check suite(s) passed (success/neutral/skipped)`);

                // Ensure ALL external checks have completed
                if (completed.length !== totalExternal) {
                  console.log(`⏳ Waiting for all checks to complete (${completed.length}/${totalExternal})`);
                  return;
                }

                // Ensure all completed checks have acceptable conclusions
                if (acceptable.length !== completed.length) {
                  const unexpected = completed.filter(s =>
                    s.conclusion !== 'success' &&
                    s.conclusion !== 'neutral' &&
                    s.conclusion !== 'skipped'
                  );
                  console.log(`❌ Not all completed checks have acceptable conclusions:`);
                  unexpected.forEach(s => console.log(`  - ${s.app?.name || 'unknown'}: ${s.conclusion}`));
                  return;
                }
              }
            }

            // ═══════════════════════════════════════════════════════════════
            // 5. EXECUTE MERGE
            // ═══════════════════════════════════════════════════════════════

            console.log("✅ All conditions met. Initiating auto-merge...");

            try {
              await github.rest.pulls.merge({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: prNumber,
                merge_method: 'squash',
                commit_title: `${pr.data.title} (#${prNumber})`,
                commit_message: `${pr.data.body || ''}\n\nAuto-merged by GitHub Actions`
              });

              console.log("🎉 PR merged successfully!");

              // Optional: Add a comment to the PR
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body: '✅ **Auto-merged** by CI/CD pipeline after all checks passed.'
              });

            } catch (e) {
              console.log(`❌ Merge failed: ${e.message}`);

              // Add error comment to PR
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body: `⚠️ **Auto-merge failed**: ${e.message}\n\nPlease merge manually.`
              });
            }
