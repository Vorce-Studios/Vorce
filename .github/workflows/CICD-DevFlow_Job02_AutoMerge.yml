name: "CICD-DevFlow: Job02 Auto-Merge"

on:
  pull_request:
    types: [labeled, synchronize, opened, reopened]
  check_suite:
    types: [completed]
  workflow_run:
    workflows: ["CICD-DevFlow: Job01 Validation", "Security Analysis"]
    types: [completed]
  status:

env:
  AUTO_MERGE_ENABLED: true

permissions:
  actions: write
  contents: write
  pull-requests: write
  issues: write
  checks: read
  statuses: read

jobs:
  auto-merge:
    name: Auto-Merge
    runs-on: ubuntu-latest
    if: github.event.pull_request != null || github.event.workflow_run != null || github.event.check_suite != null || github.event_name == 'status'
    steps:
      - name: Auto-Merge Logic
        uses: actions/github-script@v7
        with:
          script: |
            if (process.env.AUTO_MERGE_ENABLED !== 'true') {
              console.log('Auto-merge is disabled via AUTO_MERGE_ENABLED');
              return;
            }

            let prNumber = context.payload.pull_request?.number;
            const sleep = (ms) => new Promise((resolve) => setTimeout(resolve, ms));
            const findOpenPrByHeadSha = async (headSha) => {
              const prs = await github.rest.pulls.list({
                owner: context.repo.owner,
                repo: context.repo.repo,
                state: 'open',
                per_page: 100,
              });

              return prs.data.find((pr) => pr.head.sha === headSha);
            };
            const waitForUpdatedPrHead = async (pullNumber, previousHeadSha) => {
              for (let attempt = 1; attempt <= 20; attempt += 1) {
                const currentPr = await github.rest.pulls.get({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  pull_number: pullNumber,
                });

                if (currentPr.data.head.sha !== previousHeadSha) {
                  console.log(
                    `PR head updated from ${previousHeadSha} to ${currentPr.data.head.sha} on attempt ${attempt}.`,
                  );
                  return currentPr.data;
                }

                console.log(
                  `PR head still ${previousHeadSha}; waiting for branch update propagation (attempt ${attempt}/20)...`,
                );
                await sleep(3000);
              }

              console.log(
                'PR head SHA did not change after the branch update request. Skipping manual workflow dispatch to avoid targeting a stale commit.',
              );
              return null;
            };

            if (!prNumber && context.payload.workflow_run) {
              const headBranch = context.payload.workflow_run.head_branch;
              const headSha = context.payload.workflow_run.head_sha;
              console.log(`Searching for PRs with head branch "${headBranch}" and SHA ${headSha}...`);

              const prs = await github.rest.pulls.list({
                owner: context.repo.owner,
                repo: context.repo.repo,
                state: 'open',
                head: `${context.repo.owner}:${headBranch}`,
                per_page: 100,
              });

              const match = prs.data.find((pr) => pr.head.sha === headSha);
              if (match) {
                prNumber = match.number;
              } else if (prs.data.length > 0) {
                prNumber = prs.data[0].number;
              }
            }

            if (!prNumber && context.payload.check_suite) {
              const associatedPrNumber = context.payload.check_suite.pull_requests?.[0]?.number;
              if (associatedPrNumber) {
                prNumber = associatedPrNumber;
              }
            }

            if (!prNumber && context.payload.check_suite) {
              const headSha = context.payload.check_suite.head_sha;
              const match = await findOpenPrByHeadSha(headSha);
              if (match) {
                prNumber = match.number;
              }
            }

            if (!prNumber && context.eventName === 'status') {
              const headSha = context.payload.sha;
              const match = await findOpenPrByHeadSha(headSha);
              if (match) {
                prNumber = match.number;
              }
            }

            if (!prNumber) {
              console.log('No PR found for this event.');
              return;
            }

            console.log(`Checking PR #${prNumber} for auto-merge eligibility...`);

            const pr = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber,
            });

            if (pr.data.draft) {
              console.log('PR is a draft. Skipping auto-merge.');
              return;
            }

            if (pr.data.state === 'closed') {
              console.log('PR is already closed.');
              return;
            }

            console.log(`Mergeable: ${pr.data.mergeable}, state: ${pr.data.mergeable_state}`);

            if (pr.data.mergeable === false) {
              console.log('PR has merge conflicts. Cannot auto-merge.');
              return;
            }

            if (pr.data.mergeable_state === 'behind') {
              console.log('PR is behind the base branch. Updating branch before attempting auto-merge...');

              try {
                await github.rest.pulls.updateBranch({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  pull_number: prNumber,
                  expected_head_sha: pr.data.head.sha,
                });

                console.log(
                  'Branch update requested successfully. Waiting for the synchronize event and fresh required checks on the new head SHA.',
                );

                const updatedPr = await waitForUpdatedPrHead(prNumber, pr.data.head.sha);
                if (updatedPr) {
                  await github.rest.actions.createWorkflowDispatch({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    workflow_id: 'CICD-DevFlow_Job01_Validation.yml',
                    ref: updatedPr.head.ref,
                    inputs: {
                      toolchain: 'stable',
                    },
                  });

                  console.log(
                    `Triggered ${'CICD-DevFlow_Job01_Validation.yml'} via workflow_dispatch on branch ${updatedPr.head.ref} for head ${updatedPr.head.sha}.`,
                  );

                  await github.rest.actions.createWorkflowDispatch({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    workflow_id: 'CI-02_security-scan.yml',
                    ref: updatedPr.head.ref,
                  });

                  console.log(
                    `Triggered ${'CI-02_security-scan.yml'} via workflow_dispatch on branch ${updatedPr.head.ref} for head ${updatedPr.head.sha}.`,
                  );
                }
              } catch (error) {
                console.log(`Branch update failed: ${error.message}`);
              }

              return;
            }

            await new Promise((resolve) => setTimeout(resolve, 2000));

            console.log(`Fetching check runs and statuses for commit ${pr.data.head.sha}...`);

            // pre-commit.ci reports through the Status API, not the Checks API.
            const [checks, combinedStatus] = await Promise.all([
              github.rest.checks.listForRef({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: pr.data.head.sha,
              }),
              github.rest.repos.getCombinedStatusForRef({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: pr.data.head.sha,
              }),
            ]);

            console.log(
              `Found ${checks.data.total_count} check run(s) and ${combinedStatus.data.statuses.length} status context(s)`,
            );

            const EXPECTED_CHECKS = [
              {
                name: 'pre-commit.ci - pr',
                source: 'status',
                allowedConclusions: ['success'],
              },
              {
                name: 'Quality Gate (Format & Lint)',
                source: 'check_run',
                allowedConclusions: ['success'],
              },
              {
                name: 'Security Scan',
                source: 'check_run',
                allowedConclusions: ['success'],
              },
              {
                name: 'Build & Test (Linux)',
                source: 'check_run',
                allowedConclusions: ['success'],
              },
              {
                name: 'Build & Test (Windows)',
                source: 'check_run',
                allowedConclusions: ['success', 'skipped', 'neutral'],
              },
              {
                name: 'Validation Success',
                source: 'check_run',
                allowedConclusions: ['success'],
              },
              {
                name: 'Analyze (rust)',
                source: 'check_run',
                allowedConclusions: ['success'],
              },
              {
                name: 'CodeQL',
                source: 'check_run',
                allowedConclusions: ['success'],
              },
            ];

            const ownRunId = process.env.GITHUB_RUN_ID;
            const externalRuns = checks.data.check_runs.filter((run) => {
              if (run.name.includes('Auto-Merge')) {
                return false;
              }
              if (ownRunId && run.details_url?.includes(ownRunId)) {
                return false;
              }
              return true;
            });

            const latestRunsByName = new Map();
            for (const run of externalRuns.sort((left, right) => {
              const leftTime = Date.parse(left.completed_at || left.started_at || '1970-01-01T00:00:00Z');
              const rightTime = Date.parse(right.completed_at || right.started_at || '1970-01-01T00:00:00Z');
              return rightTime - leftTime;
            })) {
              if (!latestRunsByName.has(run.name)) {
                latestRunsByName.set(run.name, {
                  name: run.name,
                  source: 'check_run',
                  status: run.status,
                  conclusion: run.conclusion,
                });
              }
            }

            const latestStatusesByName = new Map();
            for (const status of combinedStatus.data.statuses) {
              if (!latestStatusesByName.has(status.context)) {
                latestStatusesByName.set(status.context, {
                  name: status.context,
                  source: 'status',
                  status: status.state === 'pending' ? 'in_progress' : 'completed',
                  conclusion: status.state === 'pending' ? null : status.state,
                });
              }
            }

            const observedChecks = [
              ...latestRunsByName.values(),
              ...latestStatusesByName.values(),
            ];

            let allRequiredPassed = true;
            const missingOrFailed = [];

            for (const expectedCheck of EXPECTED_CHECKS) {
              const match =
                expectedCheck.source === 'status'
                  ? latestStatusesByName.get(expectedCheck.name)
                  : latestRunsByName.get(expectedCheck.name);

              if (!match) {
                console.log(`Required check "${expectedCheck.name}" not found yet.`);
                allRequiredPassed = false;
                missingOrFailed.push(`${expectedCheck.name} (missing)`);
                continue;
              }

              console.log(
                `  - ${expectedCheck.name}: source=${match.source}, status=${match.status}, conclusion=${match.conclusion}`,
              );

              if (match.status !== 'completed') {
                allRequiredPassed = false;
                missingOrFailed.push(`${expectedCheck.name} (${match.status})`);
                continue;
              }

              if (!expectedCheck.allowedConclusions.includes(match.conclusion)) {
                allRequiredPassed = false;
                missingOrFailed.push(`${expectedCheck.name} (${match.conclusion})`);
              }
            }

            if (!allRequiredPassed) {
              console.log(`Auto-merge pending. Waiting for: ${missingOrFailed.join(', ')}`);
              return;
            }

            const otherFailed = observedChecks.filter(
              (check) =>
                !EXPECTED_CHECKS.some((expectedCheck) => expectedCheck.name === check.name) &&
                check.status === 'completed' &&
                ['failure', 'timed_out', 'cancelled', 'error'].includes(check.conclusion),
            );

            if (otherFailed.length > 0) {
              console.log('Non-required checks failed:');
              otherFailed.forEach((check) => console.log(`  - ${check.name}: ${check.conclusion}`));
            }

            if (pr.data.mergeable_state === 'blocked') {
              console.log("PR mergeable_state is 'blocked'. This may be caused by required reviews or other policies.");
              return;
            }

            console.log('All conditions met. Initiating auto-merge...');

            try {
              await github.rest.pulls.merge({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: prNumber,
                merge_method: 'squash',
                commit_title: `${pr.data.title} (#${prNumber})`,
                commit_message: `${pr.data.body || ''}\n\nAuto-merged by GitHub Actions`,
              });

              console.log('PR merged successfully.');

              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body: 'Auto-merged by the CI pipeline after all checks passed.',
              });
            } catch (error) {
              console.log(`Merge failed: ${error.message}`);

              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body: `Auto-merge failed: ${error.message}\n\nPlease merge manually.`,
              });
            }
