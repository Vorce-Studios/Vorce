name: "CICD-DevFlow: Job02 Auto-Merge"

on:
  pull_request:
    types: [labeled, synchronize, opened, reopened]
  check_suite:
    types: [completed]
  workflow_run:
    workflows: ["CICD-DevFlow: Job01 Validation"]
    types: [completed]

env:
  # Master Switch
  AUTO_MERGE_ENABLED: true

permissions:
  contents: write
  pull-requests: write
  issues: write
  checks: read

jobs:
  auto-merge:
    name: Auto-Merge
    runs-on: ubuntu-latest
    if: github.event.pull_request != null || github.event.workflow_run != null || github.event.check_suite != null
    steps:
      - name: Auto-Merge Logic
        uses: actions/github-script@v7
        with:
          script: |
            if (process.env.AUTO_MERGE_ENABLED !== 'true') {
              console.log("⚠️ Auto-merge is disabled via AUTO_MERGE_ENABLED");
              return;
            }

            // ═══════════════════════════════════════════════════════════════
            // 1. IDENTIFY PR (Hardened)
            // ═══════════════════════════════════════════════════════════════
            let prNumber = context.payload.pull_request?.number;

            // If triggered by workflow_run, find PR associated with the run's branch
            if (!prNumber && context.payload.workflow_run) {
              const headBranch = context.payload.workflow_run.head_branch;
              const headSha = context.payload.workflow_run.head_sha;
              console.log(`🔍 Searching for PRs with head branch "${headBranch}" and SHA ${headSha}...`);

              const prs = await github.rest.pulls.list({
                owner: context.repo.owner,
                repo: context.repo.repo,
                state: 'open',
                head: `${context.repo.owner}:${headBranch}`
              });

              // Match by SHA for extra precision if multiple PRs exist for a branch
              const match = prs.data.find(p => p.head.sha === headSha);
              if (match) prNumber = match.number;
              else if (prs.data.length > 0) prNumber = prs.data[0].number;
            }

            // If triggered by check_suite
            if (!prNumber && context.payload.check_suite) {
              const headSha = context.payload.check_suite.head_sha;
              const prs = await github.rest.pulls.list({
                owner: context.repo.owner,
                repo: context.repo.repo,
                state: 'open'
              });
              const match = prs.data.find(p => p.head.sha === headSha);
              if (match) prNumber = match.number;
            }

            if (!prNumber) {
              console.log("ℹ️ No PR found for this event.");
              return;
            }

            console.log(`🔍 Checking PR #${prNumber} for Auto-Merge eligibility...`);

            // ═══════════════════════════════════════════════════════════════
            // 2. GET PR DATA
            // ═══════════════════════════════════════════════════════════════
            const pr = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber
            });

            // ═══════════════════════════════════════════════════════════════
            // 3. PRE-CHECKS (Hardened)
            // ═══════════════════════════════════════════════════════════════

            if (pr.data.draft) {
              console.log("❌ PR is a draft. Skipping auto-merge.");
              return;
            }

            if (pr.data.state === 'closed') {
              console.log("ℹ️ PR is already closed.");
              return;
            }

            console.log(`📊 Mergeable: ${pr.data.mergeable}, State: ${pr.data.mergeable_state}`);

            if (pr.data.mergeable === false) {
              console.log("❌ PR has merge conflicts. Cannot auto-merge.");
              return;
            }

            // Handle "Behind" status
            if (pr.data.mergeable_state === 'behind') {
              console.log("⚠️ PR is behind the base branch. Attempting to update...");
              try {
                await github.rest.pulls.updateBranch({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  pull_number: prNumber
                });
                console.log("✅ Update request sent. Waiting for next event.");
                return;
              } catch (e) {
                console.log(`❌ Failed to update branch: ${e.message}`);
              }
            }

            // ═══════════════════════════════════════════════════════════════
            // 4. CHECK STATUS CHECKS (Hardened Logic)
            // ═══════════════════════════════════════════════════════════════

            // Brief delay to ensure API consistency
            await new Promise(resolve => setTimeout(resolve, 2000));

            console.log(`📊 Fetching check runs for commit ${pr.data.head.sha}...`);

            const checks = await github.rest.checks.listForRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: pr.data.head.sha
            });

            console.log(`Found ${checks.data.total_count} check run(s)`);

            const REQUIRED_CHECKS = [
              'pre-commit.ci - pr',
              'Quality Gate (Format & Lint)',
              'Security Scan',
              'Build & Test (Linux)',
              'Validation Success'
            ];

            const ownRunId = process.env.GITHUB_RUN_ID;

            const externalRuns = checks.data.check_runs.filter(r => {
              if (r.name.includes('Auto-Merge') || (ownRunId && r.details_url?.includes(ownRunId))) {
                return false;
              }
              return true;
            });

            let allRequiredPassed = true;
            const missingOrFailed = [];

            for (const reqName of REQUIRED_CHECKS) {
              const match = externalRuns.find(r => r.name === reqName);

              if (!match) {
                console.log(`⏳ Required check "${reqName}" not found yet.`);
                allRequiredPassed = false;
                missingOrFailed.push(`${reqName} (Missing)`);
                continue;
              }

              console.log(`  - ${reqName}: status=${match.status}, conclusion=${match.conclusion}`);

              if (match.status !== 'completed') {
                allRequiredPassed = false;
                missingOrFailed.push(`${reqName} (${match.status})`);
              } else if (match.conclusion !== 'success' && match.conclusion !== 'skipped' && match.conclusion !== 'neutral') {
                allRequiredPassed = false;
                missingOrFailed.push(`${reqName} (${match.conclusion})`);
              }
            }

            if (!allRequiredPassed) {
              console.log(`⏳ Auto-Merge pending. Waiting for: ${missingOrFailed.join(', ')}`);
              return;
            }

            // check if there are other FAILED checks
            const otherFailed = externalRuns.filter(r =>
              !REQUIRED_CHECKS.includes(r.name) &&
              r.status === 'completed' &&
              (r.conclusion === 'failure' || r.conclusion === 'timed_out' || r.conclusion === 'cancelled')
            );

            if (otherFailed.length > 0) {
              console.log(`❌ Non-required check(s) failed:`);
              otherFailed.forEach(r => console.log(`  - ${r.name}: ${r.conclusion}`));
            }

            // ═══════════════════════════════════════════════════════════════
            // 5. EXECUTE MERGE
            // ═══════════════════════════════════════════════════════════════

            if (pr.data.mergeable_state === 'blocked') {
              console.log("❌ PR mergeable_state is 'blocked'. This might be due to required reviews or other policies.");
<<<<<<< HEAD
=======
              // We could add a comment here if it's the first time
>>>>>>> origin/fix-hue-dtls-openssl-4596603282674004067
              return;
            }

            console.log("✅ All conditions met. Initiating auto-merge...");

            try {
              await github.rest.pulls.merge({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: prNumber,
                merge_method: 'squash',
                commit_title: `${pr.data.title} (#${prNumber})`,
                commit_message: `${pr.data.body || ''}\n\nAuto-merged by GitHub Actions`
              });

              console.log("🎉 PR merged successfully!");

              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body: '✅ **Auto-merged** by CI/CD pipeline after all checks passed.'
              });

            } catch (e) {
              console.log(`❌ Merge failed: ${e.message}`);

              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body: `⚠️ **Auto-merge failed**: ${e.message}\n\nPlease merge manually.`
              });
            }
