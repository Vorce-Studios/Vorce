name: "CICD-DevFlow: Job02 Auto-Merge"

on:
  pull_request_target:
    types: [opened, reopened, synchronize, labeled, unlabeled, ready_for_review]
    branches: [main]
  workflow_run:
    workflows: ["CICD-DevFlow: Job01 Validation"]
    types: [completed]
  workflow_dispatch:
    inputs:
      pr_number:
        description: "Optional PR number to re-evaluate manually"
        required: false
        type: string

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  AUTO_MERGE_ENABLED: true
  AUTO_UPDATE_BRANCH_WHEN_BEHIND: true
  PRECOMMIT_WORKFLOW_ID: CICD-DevFlow_Job00_PreCommitLite.yml
  VALIDATION_WORKFLOW_ID: CICD-DevFlow_Job01_Validation.yml
  DEFAULT_RUST_TOOLCHAIN: ${{ vars.VORCE_DEFAULT_TOOLCHAIN || vars.MAPFLOW_DEFAULT_TOOLCHAIN || '1.94.0' }}

concurrency:
  group: auto-merge-${{ github.event.pull_request.number || github.event.inputs.pr_number || github.event.workflow_run.head_sha || github.run_id }}
  cancel-in-progress: true

permissions:
  actions: write
  contents: write
  pull-requests: write
  issues: write
  checks: read
  statuses: read

jobs:
  auto-merge:
    name: "Auto-Merge"
    runs-on: ubuntu-latest
    if: github.event.pull_request != null || github.event.workflow_run != null || github.event_name == 'workflow_dispatch'

    steps:
      - name: Evaluate Auto-Merge Eligibility
        uses: actions/github-script@v8
        with:
          script: |
            if (process.env.AUTO_MERGE_ENABLED !== 'true') {
              console.log('Auto-merge is disabled via AUTO_MERGE_ENABLED');
              return;
            }

            const sleep = (ms) => new Promise((resolve) => setTimeout(resolve, ms));
            const AUTO_MERGE_RESULT_MARKER = '<!-- auto-merge-result -->';

            const buildManagedCommentBody = (message) =>
              `${AUTO_MERGE_RESULT_MARKER}\n${message}`;

            const upsertManagedComment = async (issueNumber, message) => {
              const body = buildManagedCommentBody(message);
              const comments = await github.paginate(github.rest.issues.listComments, {
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueNumber,
                per_page: 100,
              });

              const existingComment = [...comments]
                .reverse()
                .find((comment) => comment.body?.includes(AUTO_MERGE_RESULT_MARKER));

              if (!existingComment) {
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issueNumber,
                  body,
                });
                return;
              }

              if (existingComment.body !== body) {
                await github.rest.issues.updateComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  comment_id: existingComment.id,
                  body,
                });
              }
            };
            const VALIDATION_CHECK_NAMES = new Set([
              'Quality Gate (Format & Lint)',
              'Security Scan',
              'Build & Test (Linux)',
              'Build & Test (Windows)',
              'Build (macOS Beta)',
              'Validation Success',
            ]);
            const RUST_AUTOFIX_CHECK_NAMES = new Set(['Rust Autofix']);

            const waitForHeadShaChange = async (pullNumber, previousHeadSha) => {
              for (let attempt = 1; attempt <= 20; attempt += 1) {
                await sleep(3000);

                const refreshedPr = await github.rest.pulls.get({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  pull_number: pullNumber,
                });

                if (refreshedPr.data.head.sha !== previousHeadSha) {
                  return refreshedPr.data;
                }
              }

              return null;
            };

            const getCheckRunsState = async (headSha, expectedNames) => {
              for (let attempt = 1; attempt <= 10; attempt += 1) {
                const checks = await github.rest.checks.listForRef({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  ref: headSha,
                  per_page: 100,
                });

                const matchingRuns = checks.data.check_runs.filter((run) =>
                  expectedNames.has(run.name),
                );

                if (matchingRuns.length > 0) {
                  return {
                    found: true,
                    hasActiveRun: matchingRuns.some((run) => run.status !== 'completed'),
                  };
                }

                await sleep(3000);
              }

              return {
                found: false,
                hasActiveRun: false,
              };
            };

            const getValidationChecksState = async (headSha) =>
              getCheckRunsState(headSha, VALIDATION_CHECK_NAMES);

            const getRustAutofixChecksState = async (headSha) =>
              getCheckRunsState(headSha, RUST_AUTOFIX_CHECK_NAMES);

            const dispatchValidationWorkflow = async (branchRef) => {
              const response = await github.request(
                'POST /repos/{owner}/{repo}/actions/workflows/{workflow_id}/dispatches',
                {
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  workflow_id: process.env.VALIDATION_WORKFLOW_ID || 'CICD-DevFlow_Job01_Validation.yml',
                  ref: branchRef,
                  inputs: {
                    toolchain: process.env.DEFAULT_RUST_TOOLCHAIN || '1.94.0',
                  },
                  return_run_details: true,
                },
              );

              return response.data;
            };

            const dispatchRustAutofixWorkflow = async (branchRef, prNumber) => {
              const response = await github.request(
                'POST /repos/{owner}/{repo}/actions/workflows/{workflow_id}/dispatches',
                {
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  workflow_id: process.env.PRECOMMIT_WORKFLOW_ID || 'CICD-DevFlow_Job00_PreCommitLite.yml',
                  ref: branchRef,
                  inputs: {
                    pr_number: String(prNumber),
                  },
                  return_run_details: true,
                },
              );

              return response.data;
            };

            const recoverValidationAfterBranchUpdate = async (pr) => {
              const headCommit = await github.rest.repos.getCommit({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: pr.head.sha,
              });

              const commitMessage = headCommit.data.commit.message || '';
              const authorLogin = headCommit.data.author?.login || headCommit.data.committer?.login || '';
              const looksLikeAutomatedBranchUpdate =
                authorLogin === 'github-actions[bot]' &&
                commitMessage.startsWith(`Merge branch 'main' into ${pr.head.ref}`);

              if (!looksLikeAutomatedBranchUpdate) {
                return false;
              }

              const validationChecksState = await getValidationChecksState(pr.head.sha);
              const rustAutofixChecksState = await getRustAutofixChecksState(pr.head.sha);
              if (validationChecksState.found && rustAutofixChecksState.found) {
                return false;
              }

              const messages = [
                'Auto-merge hat erkannt, dass der aktuelle Head-SHA bereits durch ein automatisches Branch-Update entstanden ist.',
              ];

              if (validationChecksState.hasActiveRun) {
                messages.push('Die Validation-Checks laufen auf dem neuen Head-SHA bereits erneut.');
              } else if (!validationChecksState.found) {
                try {
                  const dispatchResult = await dispatchValidationWorkflow(pr.head.ref);
                  const detailsSuffix = dispatchResult?.html_url
                    ? `\n\nValidation-Run: ${dispatchResult.html_url}`
                    : '';

                  messages.push(
                    `Da auf dem neuen Head-SHA kein Validation-Lauf registriert war, wurde \`CICD-DevFlow: Job01 Validation\` per workflow_dispatch neu gestartet.${detailsSuffix}`,
                  );
                } catch (error) {
                  messages.push(
                    `Validation konnte auf dem neuen Head-SHA nicht automatisch neu gestartet werden: ${error.message}\n\nBitte starte \`CICD-DevFlow: Job01 Validation\` manuell fuer den aktuellen Head-SHA.`,
                  );
                }
              }

              if (rustAutofixChecksState.hasActiveRun) {
                messages.push('`Rust Autofix` laeuft auf dem neuen Head-SHA bereits erneut.');
              } else if (!rustAutofixChecksState.found) {
                try {
                  const dispatchResult = await dispatchRustAutofixWorkflow(pr.head.ref, pr.number);
                  const detailsSuffix = dispatchResult?.html_url
                    ? `\n\nRust-Autofix-Run: ${dispatchResult.html_url}`
                    : '';

                  messages.push(
                    `Da auf dem neuen Head-SHA kein \`Rust Autofix\`-Check registriert war, wurde \`CICD-DevFlow: Job00 Pre-Commit Lite\` per workflow_dispatch neu gestartet.${detailsSuffix}`,
                  );
                } catch (error) {
                  messages.push(
                    `\`Rust Autofix\` konnte auf dem neuen Head-SHA nicht automatisch neu gestartet werden: ${error.message}\n\nBitte starte \`CICD-DevFlow: Job00 Pre-Commit Lite\` manuell fuer PR #${pr.number}.`,
                  );
                }
              }

              await upsertManagedComment(pr.number, messages.join('\n\n'));
              return true;
            };

            const updateBranchIfBehind = async (pr, phaseLabel) => {
              if (process.env.AUTO_UPDATE_BRANCH_WHEN_BEHIND !== 'true') {
                await upsertManagedComment(
                  pr.number,
                  'Auto-merge wartet, weil der PR hinter `main` liegt. Bitte aktualisiere den Branch manuell; automatische Branch-Updates aus diesem Workflow sind deaktiviert.',
                );
                return true;
              }

              try {
                await github.rest.pulls.updateBranch({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  pull_number: pr.number,
                });
              } catch (error) {
                const message = error?.status === 422
                  ? 'Auto-merge konnte den Branch nicht automatisch aktualisieren. GitHub meldet, dass der PR aktuell nicht per Update-Branch aktualisiert werden kann.'
                  : `Auto-merge konnte den Branch nicht automatisch aktualisieren: ${error.message}`;

                await upsertManagedComment(pr.number, `${message}\n\nBitte aktualisiere den Branch manuell.`);
                return true;
              }

              const updatedPr = await waitForHeadShaChange(pr.number, pr.head.sha);
              if (!updatedPr) {
                await upsertManagedComment(
                  pr.number,
                  'Auto-merge hat ein automatisches Branch-Update angestossen, aber der neue Head-SHA konnte nicht rechtzeitig bestaetigt werden. Bitte pruefe den PR erneut.',
                );
                return true;
              }

              const validationChecksState = await getValidationChecksState(updatedPr.head.sha);
              const rustAutofixChecksState = await getRustAutofixChecksState(updatedPr.head.sha);
              const messages = [
                `Auto-merge hat waehrend ${phaseLabel} erkannt, dass der PR hinter \`main\` liegt und ein automatisches Branch-Update angestossen.`,
              ];

              if (validationChecksState.hasActiveRun) {
                messages.push('Die Validation-Checks laufen auf dem neuen Head-SHA bereits erneut.');
              } else if (validationChecksState.found) {
                messages.push('Die Validation-Checks sind auf dem neuen Head-SHA bereits registriert.');
              } else {
                try {
                  const dispatchResult = await dispatchValidationWorkflow(updatedPr.head.ref);
                  const detailsSuffix = dispatchResult?.html_url
                    ? `\n\nValidation-Run: ${dispatchResult.html_url}`
                    : '';

                  messages.push(
                    `Da GitHub auf dem neuen Head-SHA keinen Validation-Lauf gestartet hat, wurde \`CICD-DevFlow: Job01 Validation\` zusaetzlich per workflow_dispatch fuer den aktualisierten Branch gestartet.${detailsSuffix}`,
                  );
                } catch (error) {
                  messages.push(
                    `Validation konnte auf dem aktualisierten Branch nicht automatisch neu angestossen werden: ${error.message}\n\nBitte starte \`CICD-DevFlow: Job01 Validation\` manuell fuer den aktualisierten Branch.`,
                  );
                }
              }

              if (rustAutofixChecksState.hasActiveRun) {
                messages.push('`Rust Autofix` laeuft auf dem neuen Head-SHA bereits erneut.');
              } else if (rustAutofixChecksState.found) {
                messages.push('`Rust Autofix` ist auf dem neuen Head-SHA bereits registriert.');
              } else {
                try {
                  const dispatchResult = await dispatchRustAutofixWorkflow(updatedPr.head.ref, updatedPr.number);
                  const detailsSuffix = dispatchResult?.html_url
                    ? `\n\nRust-Autofix-Run: ${dispatchResult.html_url}`
                    : '';

                  messages.push(
                    `Da GitHub auf dem neuen Head-SHA keinen \`Rust Autofix\`-Check gestartet hat, wurde \`CICD-DevFlow: Job00 Pre-Commit Lite\` zusaetzlich per workflow_dispatch fuer den aktualisierten Branch gestartet.${detailsSuffix}`,
                  );
                } catch (error) {
                  messages.push(
                    `\`Rust Autofix\` konnte auf dem aktualisierten Branch nicht automatisch neu angestossen werden: ${error.message}\n\nBitte starte \`CICD-DevFlow: Job00 Pre-Commit Lite\` manuell fuer PR #${updatedPr.number}.`,
                  );
                }
              }

              await upsertManagedComment(pr.number, messages.join('\n\n'));

              return true;
            };
            const findOpenPrByHeadSha = async (headSha) => {
              const prs = await github.rest.pulls.list({
                owner: context.repo.owner,
                repo: context.repo.repo,
                state: 'open',
                per_page: 100,
              });

              return prs.data.find((pr) => pr.head.sha === headSha);
            };

            const waitForResolvedMergeability = async (pullNumber, initialPr) => {
              let currentPr = initialPr;

              for (let attempt = 1; attempt <= 10; attempt += 1) {
                if (
                  (currentPr.mergeable_state && currentPr.mergeable_state !== 'unknown') ||
                  currentPr.mergeable !== null
                ) {
                  return currentPr;
                }

                await sleep(2000);

                const refreshedPr = await github.rest.pulls.get({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  pull_number: pullNumber,
                });
                currentPr = refreshedPr.data;
              }

              return null;
            };

            const getExpectedChecks = () => {
              return [
                {
                  name: 'pre-commit.ci - pr',
                  source: 'status',
                  allowedConclusions: ['success'],
                  required: true,
                },
                {
                  name: 'Rust Autofix',
                  source: 'check_run',
                  allowedConclusions: ['success'],
                  required: true,
                },
                {
                  name: 'Quality Gate (Format & Lint)',
                  source: 'check_run',
                  allowedConclusions: ['success'],
                  required: true,
                },
                {
                  name: 'Security Scan',
                  source: 'check_run',
                  allowedConclusions: ['success'],
                  required: true,
                },
                {
                  name: 'Build & Test (Linux)',
                  source: 'check_run',
                  allowedConclusions: ['success'],
                  required: true,
                },
                {
                  name: 'Build & Test (Windows)',
                  source: 'check_run',
                  allowedConclusions: ['success'],
                  required: true,
                },
                {
                  name: 'Validation Success',
                  source: 'check_run',
                  allowedConclusions: ['success'],
                  required: true,
                },
              ];
            };

            let prNumber = context.payload.pull_request?.number;
            const manualPrNumber = context.payload.inputs?.pr_number;

            if (!prNumber && manualPrNumber) {
              const parsedPrNumber = Number.parseInt(manualPrNumber, 10);
              if (Number.isNaN(parsedPrNumber)) {
                return;
              }
              prNumber = parsedPrNumber;
            }

            if (!prNumber && context.payload.workflow_run) {
              const headBranch = context.payload.workflow_run.head_branch;
              const headSha = context.payload.workflow_run.head_sha;

              const prs = await github.rest.pulls.list({
                owner: context.repo.owner,
                repo: context.repo.repo,
                state: 'open',
                head: `${context.repo.owner}:${headBranch}`,
                per_page: 100,
              });

              const match = prs.data.find((pr) => pr.head.sha === headSha);
              if (match) {
                prNumber = match.number;
              } else if (prs.data.length > 0) {
                prNumber = prs.data[0].number;
              }
            }

            if (!prNumber && context.payload.workflow_run?.head_sha) {
              const match = await findOpenPrByHeadSha(context.payload.workflow_run.head_sha);
              if (match) {
                prNumber = match.number;
              }
            }

            if (!prNumber) {
              return;
            }

            const initialPrResponse = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber,
            });

            const pr = await waitForResolvedMergeability(prNumber, initialPrResponse.data);
            if (!pr) {
              return;
            }

            if (pr.draft || pr.state === 'closed') {
              return;
            }

            if (pr.mergeable === false) {
              await upsertManagedComment(
                prNumber,
                'Auto-merge ist blockiert, weil der PR Merge-Konflikte enthält.',
              );
              return;
            }

            if (pr.mergeable_state === 'behind') {
              await updateBranchIfBehind(pr, 'der fruehen Merge-Pruefung');
              return;
            }

            await sleep(2000);

            const [checks, combinedStatus] = await Promise.all([
              github.rest.checks.listForRef({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: pr.head.sha,
                per_page: 100,
              }),
              github.rest.repos.getCombinedStatusForRef({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: pr.head.sha,
              }),
            ]);

            const ownRunId = process.env.GITHUB_RUN_ID;
            const externalRuns = checks.data.check_runs.filter((run) => {
              if (run.name.includes('Auto-Merge')) {
                return false;
              }
              if (ownRunId && run.details_url?.includes(ownRunId)) {
                return false;
              }
              return true;
            });

            const latestRunsByName = new Map();
            for (const run of externalRuns.sort((left, right) => {
              const leftTime = Date.parse(left.completed_at || left.started_at || '1970-01-01T00:00:00Z');
              const rightTime = Date.parse(right.completed_at || right.started_at || '1970-01-01T00:00:00Z');
              return rightTime - leftTime;
            })) {
              if (!latestRunsByName.has(run.name)) {
                latestRunsByName.set(run.name, {
                  name: run.name,
                  source: 'check_run',
                  status: run.status,
                  conclusion: run.conclusion,
                });
              }
            }

            const latestStatusesByName = new Map();
            for (const status of [...combinedStatus.data.statuses].sort((left, right) => {
              const leftTime = Date.parse(left.updated_at || left.created_at || '1970-01-01T00:00:00Z');
              const rightTime = Date.parse(right.updated_at || right.created_at || '1970-01-01T00:00:00Z');
              return rightTime - leftTime;
            })) {
              if (!latestStatusesByName.has(status.context)) {
                latestStatusesByName.set(status.context, {
                  name: status.context,
                  source: 'status',
                  status: status.state === 'pending' ? 'in_progress' : 'completed',
                  conclusion: status.state === 'pending' ? null : status.state,
                });
              }
            }

            const expectedChecks = getExpectedChecks();
            let allRequiredPassed = true;
            const missingOrFailed = [];

            for (const expectedCheck of expectedChecks.filter((check) => check.required)) {
              const match =
                expectedCheck.source === 'status'
                  ? latestStatusesByName.get(expectedCheck.name)
                  : latestRunsByName.get(expectedCheck.name);

              if (!match) {
                allRequiredPassed = false;
                missingOrFailed.push(`${expectedCheck.name} (missing)`);
                continue;
              }

              if (match.status !== 'completed') {
                allRequiredPassed = false;
                missingOrFailed.push(`${expectedCheck.name} (${match.status})`);
                continue;
              }

              if (!expectedCheck.allowedConclusions.includes(match.conclusion)) {
                allRequiredPassed = false;
                missingOrFailed.push(`${expectedCheck.name} (${match.conclusion})`);
              }
            }

            if (!allRequiredPassed) {
              if (await recoverValidationAfterBranchUpdate(pr)) {
                return;
              }

              await upsertManagedComment(
                prNumber,
                `Auto-merge wartet noch auf erfolgreiche Pflicht-Checks: ${missingOrFailed.join(', ')}.`,
              );
              return;
            }

            const refreshedPrResponse = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber,
            });

            const finalPr = await waitForResolvedMergeability(prNumber, refreshedPrResponse.data);
            if (!finalPr) {
              return;
            }

            if (finalPr.state === 'closed' || finalPr.draft || finalPr.mergeable === false) {
              return;
            }

            if (finalPr.mergeable_state === 'behind') {
              await updateBranchIfBehind(finalPr, 'der finalen Merge-Pruefung');
              return;
            }

            try {
              await github.rest.pulls.merge({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: prNumber,
                merge_method: 'squash',
                commit_title: `${finalPr.title} (#${prNumber})`,
                commit_message: `${finalPr.body || ''}\n\nAuto-merged by GitHub Actions`,
              });

              await upsertManagedComment(
                prNumber,
                'Auto-merged by the CI pipeline after all required checks passed.',
              );
            } catch (error) {
              await upsertManagedComment(
                prNumber,
                `Auto-merge failed: ${error.message}\n\nPlease merge manually.`,
              );
            }
