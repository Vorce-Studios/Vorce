name: "CICD-DevFlow: Job02 Auto-Merge"

on:
  pull_request:
    types: [labeled, synchronize, opened, reopened]
  check_suite:
    types: [completed]
  workflow_run:
    workflows: ["CICD-DevFlow: Job01 Validation"]
    types: [completed]

env:
  AUTO_MERGE_ENABLED: true

permissions:
  contents: write
  pull-requests: write
  issues: write
  checks: read

jobs:
  auto-merge:
    name: Auto-Merge
    runs-on: ubuntu-latest
    if: github.event.pull_request != null || github.event.workflow_run != null || github.event.check_suite != null
    steps:
      - name: Auto-Merge Logic
        uses: actions/github-script@v7
        with:
          script: |
            if (process.env.AUTO_MERGE_ENABLED !== 'true') {
              console.log('Auto-merge is disabled via AUTO_MERGE_ENABLED');
              return;
            }

            let prNumber = context.payload.pull_request?.number;

            if (!prNumber && context.payload.workflow_run) {
              const headBranch = context.payload.workflow_run.head_branch;
              const headSha = context.payload.workflow_run.head_sha;
              console.log(`Searching for PRs with head branch "${headBranch}" and SHA ${headSha}...`);

              const prs = await github.rest.pulls.list({
                owner: context.repo.owner,
                repo: context.repo.repo,
                state: 'open',
                head: `${context.repo.owner}:${headBranch}`,
              });

              const match = prs.data.find((pr) => pr.head.sha === headSha);
              if (match) {
                prNumber = match.number;
              } else if (prs.data.length > 0) {
                prNumber = prs.data[0].number;
              }
            }

            if (!prNumber && context.payload.check_suite) {
              const headSha = context.payload.check_suite.head_sha;
              const prs = await github.rest.pulls.list({
                owner: context.repo.owner,
                repo: context.repo.repo,
                state: 'open',
              });
              const match = prs.data.find((pr) => pr.head.sha === headSha);
              if (match) {
                prNumber = match.number;
              }
            }

            if (!prNumber) {
              console.log('No PR found for this event.');
              return;
            }

            console.log(`Checking PR #${prNumber} for auto-merge eligibility...`);

            const pr = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber,
            });

            if (pr.data.draft) {
              console.log('PR is a draft. Skipping auto-merge.');
              return;
            }

            if (pr.data.state === 'closed') {
              console.log('PR is already closed.');
              return;
            }

            console.log(`Mergeable: ${pr.data.mergeable}, state: ${pr.data.mergeable_state}`);

            if (pr.data.mergeable === false) {
              console.log('PR has merge conflicts. Cannot auto-merge.');
              return;
            }

            if (pr.data.mergeable_state === 'behind') {
              console.log(
                'PR is behind the base branch. Skipping automatic branch updates because bot-generated update commits do not re-emit the required PR checks on the new head SHA.',
              );
            }

            await new Promise((resolve) => setTimeout(resolve, 2000));

            console.log(`Fetching check runs for commit ${pr.data.head.sha}...`);

            const checks = await github.rest.checks.listForRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: pr.data.head.sha,
            });

            console.log(`Found ${checks.data.total_count} check run(s)`);

            const REQUIRED_CHECKS = [
              'pre-commit.ci - pr',
              'Quality Gate (Format & Lint)',
              'Security Scan',
              'Build & Test (Linux)',
              'Validation Success',
            ];

            const ownRunId = process.env.GITHUB_RUN_ID;
            const externalRuns = checks.data.check_runs.filter((run) => {
              if (run.name.includes('Auto-Merge')) {
                return false;
              }
              if (ownRunId && run.details_url?.includes(ownRunId)) {
                return false;
              }
              return true;
            });

            let allRequiredPassed = true;
            const missingOrFailed = [];

            for (const requiredName of REQUIRED_CHECKS) {
              const match = externalRuns.find((run) => run.name === requiredName);

              if (!match) {
                console.log(`Required check "${requiredName}" not found yet.`);
                allRequiredPassed = false;
                missingOrFailed.push(`${requiredName} (missing)`);
                continue;
              }

              console.log(`  - ${requiredName}: status=${match.status}, conclusion=${match.conclusion}`);

              if (match.status !== 'completed') {
                allRequiredPassed = false;
                missingOrFailed.push(`${requiredName} (${match.status})`);
                continue;
              }

              if (!['success', 'skipped', 'neutral'].includes(match.conclusion)) {
                allRequiredPassed = false;
                missingOrFailed.push(`${requiredName} (${match.conclusion})`);
              }
            }

            if (!allRequiredPassed) {
              console.log(`Auto-merge pending. Waiting for: ${missingOrFailed.join(', ')}`);
              return;
            }

            const otherFailed = externalRuns.filter(
              (run) =>
                !REQUIRED_CHECKS.includes(run.name) &&
                run.status === 'completed' &&
                ['failure', 'timed_out', 'cancelled'].includes(run.conclusion),
            );

            if (otherFailed.length > 0) {
              console.log('Non-required checks failed:');
              otherFailed.forEach((run) => console.log(`  - ${run.name}: ${run.conclusion}`));
            }

            if (pr.data.mergeable_state === 'blocked') {
              console.log("PR mergeable_state is 'blocked'. This may be caused by required reviews or other policies.");
              return;
            }

            console.log('All conditions met. Initiating auto-merge...');

            try {
              await github.rest.pulls.merge({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: prNumber,
                merge_method: 'squash',
                commit_title: `${pr.data.title} (#${prNumber})`,
                commit_message: `${pr.data.body || ''}\n\nAuto-merged by GitHub Actions`,
              });

              console.log('PR merged successfully.');

              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body: 'Auto-merged by the CI pipeline after all checks passed.',
              });
            } catch (error) {
              console.log(`Merge failed: ${error.message}`);

              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body: `Auto-merge failed: ${error.message}\n\nPlease merge manually.`,
              });
            }
