name: "CICD-IssueFlow: Job01 SessionTrigger"

on:
  issues:
    types: [labeled]
  workflow_dispatch:
    inputs:
      issue_number:
        description: 'Issue Number'
        required: false
        type: string

permissions:
  issues: write
  contents: write
  pull-requests: write
  actions: write

env:
  JULES_AUTOMATION_ENABLED: true

jobs:
  trigger-session:
    name: Start Jules Session
    runs-on: ubuntu-latest
    if: github.event.label.name == 'jules-task' || github.event_name == 'workflow_dispatch'

    concurrency:
      group: issue-flow-session-${{ github.repository }}
      cancel-in-progress: false

    steps:
      - name: Execute Trigger Logic
        id: flow
        uses: actions/github-script@v7
        env:
          JULES_API_KEY: ${{ secrets.JULES_API_KEY }}
        with:
          script: |
            if (process.env.JULES_AUTOMATION_ENABLED !== 'true') return;

            const TRACKER_COMMENT_MARKER = '<!-- maestro-jules-session -->';
            const today = new Date().toISOString().slice(0, 10);
            const isManualDispatch = context.eventName === 'workflow_dispatch';
            const issueNumber = context.payload.issue?.number || context.payload.inputs?.issue_number;
            if (!issueNumber) {
              console.log('No issue identified.');
              return;
            }

            const issue = await github.rest.issues.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
            });
            const issueLabels = issue.data.labels.map((label) => typeof label === 'string' ? label : label.name).filter(Boolean);
            const hasApprovalLabel = issueLabels.includes('jules-task');
            const hasUserQueueLabel = issueLabels.includes('Todo-UserISU');

            if (!isManualDispatch && !hasApprovalLabel) {
              console.log('Issue is not approved for Jules yet.');
              return;
            }

            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              per_page: 100,
            });
            const existingTracker = comments.data.find((comment) => (comment.body || '').includes(TRACKER_COMMENT_MARKER));
            const existingLegacySession = comments.data.find((comment) => /Jules Session Triggered|Jules session created/i.test(comment.body || ''));
            if (existingTracker || existingLegacySession) {
              console.log('Session already tracked on this issue.');
              return;
            }

            if (!process.env.JULES_API_KEY) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueNumber,
                body: 'JULES_API_KEY missing. Cannot start session.',
              });
              return;
            }

            if (hasUserQueueLabel) {
              try {
                await github.rest.issues.removeLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issueNumber,
                  name: 'Todo-UserISU',
                });
              } catch (error) {
                console.log(`Todo-UserISU label not removed: ${error.message}`);
              }
            }

            const fetch = globalThis.fetch ?? (await import('node-fetch')).default;
            const preferredBranch = `jules/issue-${issueNumber}`;
            const endpoint = 'https://jules.googleapis.com/v1alpha/sessions';
            const payload = {
              prompt: `Issue #${issueNumber}: ${issue.data.title}\n\n${issue.data.body || ''}\n\n---\n## Verlinktes Issue\nFixes #${issueNumber}\n\nUse the real GitHub issue number, not a roadmap ID.\nIf Jules can influence the work branch name, prefer \`${preferredBranch}\`.`,
              title: `Issue #${issueNumber}: ${issue.data.title}`.substring(0, 100),
              automationMode: 'AUTO_CREATE_PR',
              sourceContext: {
                source: `sources/github/${context.repo.owner}/${context.repo.repo}`,
                githubRepoContext: { startingBranch: 'main' },
              },
            };

            console.log('Sending API request to Jules...');
            const res = await fetch(endpoint, {
              method: 'POST',
              headers: {
                'Content-Type': 'application/json',
                'X-Goog-Api-Key': process.env.JULES_API_KEY,
              },
              body: JSON.stringify(payload),
            });

            if (!res.ok) {
              const txt = await res.text();
              console.error(`Status ${res.status}: ${txt}`);
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueNumber,
                body: `Jules API error: ${res.status}`,
              });
              throw new Error('API failed');
            }

            const json = await res.json();
            const outputs = Array.isArray(json.outputs) ? json.outputs : [];
            const prOutput = outputs.find((entry) => entry?.pullRequest?.url)?.pullRequest || null;
            const sessionUrl = json.url || '';
            const sessionId = json.name || json.id || '';
            const workBranch = json.branch || json.branchName || prOutput?.headRefName || '';
            const prUrl = prOutput?.url || '';
            const trackerBody = [
              TRACKER_COMMENT_MARKER,
              '## Jules Session Tracking',
              `- Session ID: ${sessionId ? `\`${sessionId}\`` : 'pending'}`,
              `- Session URL: ${sessionUrl ? `[Open Session](${sessionUrl})` : 'pending'}`,
              `- Pull Request: ${prUrl || 'pending'}`,
              `- Work Branch: ${workBranch ? `\`${workBranch}\`` : 'pending'}`,
              '- Remote State: jules_created',
              `- Last Update: ${today}`,
            ].join('\n');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              body: trackerBody,
            });

            console.log(`Session created: ${sessionId}`);
