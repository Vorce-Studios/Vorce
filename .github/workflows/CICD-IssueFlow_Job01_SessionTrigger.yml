name: "CICD-IssueFlow: Job01 SessionTrigger"

on:
  issues:
    types: [labeled]
  workflow_dispatch:
    inputs:
      issue_number:
        description: "Issue Number"
        required: false
        type: string

permissions:
  contents: read
  issues: write
  pull-requests: write
  repository-projects: write

env:
  JULES_AUTOMATION_ENABLED: true

jobs:
  trigger-session:
    name: Start Jules Session
    runs-on: ubuntu-latest
    if: github.event.label.name == 'jules-task' || github.event_name == 'workflow_dispatch'

    concurrency:
      group: issue-flow-session-${{ github.repository }}
      cancel-in-progress: false

    steps:
      - uses: actions/checkout@v6

      - name: Resolve issue and guard against duplicate dispatch
        id: guard
        uses: actions/github-script@v8
        with:
          script: |
            core.setOutput('should_start', 'false');

            if (process.env.JULES_AUTOMATION_ENABLED !== 'true') {
              core.info('Jules automation disabled.');
              return;
            }

            const isManualDispatch = context.eventName === 'workflow_dispatch';
            const issueNumber = Number.parseInt(
              String(context.payload.issue?.number || context.payload.inputs?.issue_number || ''),
              10,
            );

            if (!Number.isInteger(issueNumber) || issueNumber <= 0) {
              core.info('No valid issue number found.');
              return;
            }

            const issue = await github.rest.issues.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
            });

            const issueLabels = (issue.data.labels || [])
              .map((label) => (typeof label === 'string' ? label : label.name))
              .filter(Boolean);

            if (!isManualDispatch && !issueLabels.includes('jules-task')) {
              core.info('Issue is not approved for Jules.');
              return;
            }

            const body = issue.data.body || '';
            const sessionIdMatch = body.match(/<!-- jules-session-id:\s*([^>]*?) -->/i);
            const sessionNameMatch = body.match(/<!-- jules-session-name:\s*([^>]*?) -->/i);
            const hasBodyReference = [sessionIdMatch?.[1], sessionNameMatch?.[1]].some(
              (value) => typeof value === 'string' && value.trim().length > 0,
            );

            if (hasBodyReference) {
              core.info(`Issue #${issueNumber} already contains a Jules session reference.`);
              return;
            }

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              per_page: 100,
            });

            const hasSessionComment = comments.some((comment) => {
              const commentBody = comment.body || '';
              return commentBody.includes('Jules Session Triggered') || commentBody.includes('Jules Session erstellt');
            });

            if (hasSessionComment) {
              core.info(`Issue #${issueNumber} already has a session comment.`);
              return;
            }

            core.setOutput('should_start', 'true');
            core.setOutput('issue_number', String(issueNumber));

      - name: Note missing Jules API key
        if: ${{ steps.guard.outputs.should_start == 'true' && secrets.JULES_API_KEY == '' }}
        uses: actions/github-script@v8
        with:
          script: |
            const issueNumber = Number.parseInt('${{ steps.guard.outputs.issue_number }}', 10);
            if (!Number.isInteger(issueNumber) || issueNumber <= 0) {
              return;
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              body: 'WARNUNG: `JULES_API_KEY` fehlt. Es konnte keine Jules Session erstellt werden.',
            });

      - name: Create Jules session and sync issue tracking
        if: ${{ steps.guard.outputs.should_start == 'true' && secrets.JULES_API_KEY != '' }}
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.PROJECT_SYNC_GH_TOKEN || github.token }}
          JULES_API_KEY: ${{ secrets.JULES_API_KEY }}
          VORCE_PROJECT_OWNER: ${{ vars.VORCE_PROJECT_OWNER || github.repository_owner }}
          VORCE_PROJECT_NUMBER: ${{ vars.VORCE_PROJECT_NUMBER }}
          VORCE_PROJECT_STATUS_FIELD: ${{ vars.VORCE_PROJECT_STATUS_FIELD }}
          VORCE_PROJECT_QUEUE_STATE_FIELD: ${{ vars.VORCE_PROJECT_QUEUE_STATE_FIELD }}
          VORCE_PROJECT_REMOTE_STATE_FIELD: ${{ vars.VORCE_PROJECT_REMOTE_STATE_FIELD }}
          VORCE_PROJECT_WORK_BRANCH_FIELD: ${{ vars.VORCE_PROJECT_WORK_BRANCH_FIELD }}
          VORCE_PROJECT_LAST_UPDATE_FIELD: ${{ vars.VORCE_PROJECT_LAST_UPDATE_FIELD }}
          VORCE_PROJECT_LINKED_PR_FIELD: ${{ vars.VORCE_PROJECT_LINKED_PR_FIELD }}
        run: |
          ./scripts/jules/create-jules-session.ps1 `
            -IssueNumber ${{ steps.guard.outputs.issue_number }} `
            -Repository ${{ github.repository }} `
            -ApiKey $env:JULES_API_KEY `
            -AutoCreatePr
