name: "CICD-IssueFlow: Job01 SessionTrigger"

on:
  issues:
    types: [labeled]
  workflow_dispatch:
    inputs:
      issue_number:
        description: 'Issue Number'
        required: false
        type: string

permissions:
  issues: write
  contents: write
  pull-requests: write
  actions: write

env:
  JULES_AUTOMATION_ENABLED: true

jobs:
  trigger-session:
    name: Start Jules Session
    runs-on: ubuntu-latest
    if: github.event.label.name == 'jules-task' || github.event_name == 'workflow_dispatch'

    concurrency:
      group: issue-flow-session-${{ github.repository }}
      cancel-in-progress: false

    steps:
      - uses: actions/checkout@v4

      - name: Execute Trigger Logic
        id: flow
        uses: actions/github-script@v7
        env:
          JULES_API_KEY: ${{ secrets.JULES_API_KEY }}
        with:
          script: |
             if (process.env.JULES_AUTOMATION_ENABLED !== 'true') return;

             const isManualDispatch = context.eventName === 'workflow_dispatch';
             const issueNumber = context.payload.issue?.number || context.payload.inputs?.issue_number;
             if (!issueNumber) { console.log("No issue identified."); return; }

             console.log(`🎯 Processing Issue #${issueNumber}`);

             const issue = await github.rest.issues.get({ owner: context.repo.owner, repo: context.repo.repo, issue_number: issueNumber });
             const issueLabels = issue.data.labels.map((label) => typeof label === 'string' ? label : label.name).filter(Boolean);
             const hasApprovalLabel = issueLabels.includes('jules-task');
             const hasUserQueueLabel = issueLabels.includes('Todo-UserISU');

             if (!isManualDispatch && !hasApprovalLabel) {
               console.log("Issue is not approved for Jules yet.");
               return;
             }

             // 1. Helper: Check if session exists (Parsing comments)
             const comments = await github.rest.issues.listComments({
               owner: context.repo.owner, repo: context.repo.repo, issue_number: issueNumber
             });
             const hasSession = comments.data.some(c => c.body.includes('Jules Session Triggered') || c.body.includes('Jules session created'));
             if (hasSession) {
               console.log("Session already exists.");
               return;
             }

             // 2. Validate Key
             if (!process.env.JULES_API_KEY) {
               await github.rest.issues.createComment({
                 owner: context.repo.owner, repo: context.repo.repo, issue_number: issueNumber,
                 body: "⚠️ JULES_API_KEY missing. Cannot start session."
               });
               return;
             }

             if (hasUserQueueLabel) {
               try {
                 await github.rest.issues.removeLabel({
                   owner: context.repo.owner,
                   repo: context.repo.repo,
                   issue_number: issueNumber,
                   name: 'Todo-UserISU'
                 });
               } catch (error) {
                 console.log(`Todo-UserISU label not removed: ${error.message}`);
               }
             }

             // 3. Create Session
             const fetch = globalThis.fetch ?? (await import('node-fetch')).default;

             const endpoint = 'https://jules.googleapis.com/v1alpha/sessions';
             const payload = {
               prompt: `Issue #${issueNumber}: ${issue.data.title}\n\n${issue.data.body || ''}\n\n---\n**IMPORTANT:** When generating the Pull Request description for this issue-backed task, you MUST include this exact block with the real GitHub issue number:\n## Verlinktes Issue\nFixes #${issueNumber}\n\nDo not replace the GitHub issue number with a ROADMAP task ID like MF-123.`,
               title: `Issue #${issueNumber}: ${issue.data.title}`.substring(0, 100),
               automationMode: 'AUTO_CREATE_PR',
               sourceContext: {
                 source: `sources/github/${context.repo.owner}/${context.repo.repo}`,
                 githubRepoContext: { startingBranch: 'main' }
               }
             };

             console.log("Sending API Request to Jules...");
             const res = await fetch(endpoint, {
               method: 'POST',
               headers: { 'Content-Type': 'application/json', 'X-Goog-Api-Key': process.env.JULES_API_KEY },
               body: JSON.stringify(payload)
             });

             if (!res.ok) {
               const txt = await res.text();
               console.error(`Status ${res.status}: ${txt}`);
               await github.rest.issues.createComment({
                 owner: context.repo.owner, repo: context.repo.repo, issue_number: issueNumber,
                 body: `⚠️ Jules API Error: ${res.status}`
               });
               throw new Error("API Failed");
             }

             const json = await res.json();
             const sessionUrl = json.url || '';
             const sessionId = json.name || json.id;

             console.log(`✅ Session created: ${sessionId}`);
             await github.rest.issues.createComment({
                 owner: context.repo.owner, repo: context.repo.repo, issue_number: issueNumber,
                 body: `🤖 **Jules Session Triggered** — [Open Session](${sessionUrl})`
             });

             console.log("Session created. Manual monitor workflow remains available if needed.");
