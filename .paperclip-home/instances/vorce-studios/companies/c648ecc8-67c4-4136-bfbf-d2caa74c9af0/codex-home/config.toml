# Runtime: Process Adapter mit Qwen
model = "qwen"
model_reasoning_effort = "high"
approvals_reviewer = "user"
sandbox_mode = "workspace-write"

[runtime]
adapter = "process"
cmd = "qwen"
args = ["-y", "--sandbox", "--dangerously-skip-permissions"]

[projects.'\\?\C:\Users\Vinyl\Desktop\VJMapper\VjMapper']
trust_level = "trusted"

[projects.'C:\WINDOWS\system32']
trust_level = "trusted"

[windows]
sandbox = "unelevated"

[notice]
hide_full_access_warning = true
hide_rate_limit_model_nudge = true

[features]
multi_agent = true

[plugins."github@openai-curated"]
enabled = true

[plugins."canva@openai-curated"]
enabled = true
