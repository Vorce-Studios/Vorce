<user-request>
{{args}}
</user-request>

Your task:
1. Determine the monitor interval (in seconds) from the <user-request>. Default to 300 if not specified.
2. Start the PowerShell script `C:/Users/Vinyl/Desktop/VJMapper/VjMapper/scripts/gemini-cli/monitor-vorce.ps1` in the background.
3. Pass the following arguments to the script:
   - `-Interval`: The determined interval.
   - `-SessionId`: Use the current session ID ($GEMINI_SESSION_ID).
4. Use the `run_shell_command` tool with `is_background: true` to execute the script.
5. Confirm once the monitor is running.
"""
