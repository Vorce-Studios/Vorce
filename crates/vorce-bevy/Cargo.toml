[package]
name = "vorce-bevy"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
authors.workspace = true
license.workspace = true
repository.workspace = true

[dependencies]
anyhow = { workspace = true }
# Bevy 0.15 stable
bevy = { version = "0.15.0", features = [
    "tonemapping_luts",
    "default_font",
] }

vorce-core = { path = "../vorce-core" }
rand = "0.9.2"
thiserror = { workspace = true }
tracing = { workspace = true }
wgpu = "24.0.0"
# bevy_light and bevy_camera are parts of bevy or separate compatible crates
# Removing git references for now to see if standard bevy suffices

[target.'cfg(all(unix, not(target_os = "macos")))'.dependencies]
bevy = { git = "https://github.com/bevyengine/bevy", branch = "main", default-features = false, features = ["wayland"] }
